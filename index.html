    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Schermata di caricamento — visibile finché React non renderizza ── */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #dubi-boot {
      position: fixed; inset: 0;
      background: #FAF9F7;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #dubi-boot.hidden { opacity: 0; pointer-events: none; }

      width: 32px; height: 32px;

      border-top-color: #6B8A64;
      border-radius: 50%;
      animation: dubi-spin 0.8s linear infinite;
    }
    .dubi-boot-msg {
      font-size: 13px; color: #9A9490; letter-spacing: 0.04em;
    }
    .dubi-boot-error {
      font-size: 13px; color: #c0392b; text-align: center;
      max-width: 280px; line-height: 1.5; display: none;
    }
    @keyframes dubi-spin { to { transform: rotate(360deg); } }

    /* Rimuove le frecce/spinner dai campi numerici in tutti i browser */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; appearance: textfield; }

const API_BASE_URL = "https://dubi-backend.onrender.com";

    const normalizeOnboarding = (data) => {
  if (!data) return null;

  const parseHour = (value, fallback) => {
    if (!value) return fallback;
    if (typeof value === "number") return value;
    const hour = parseInt(String(value).split(":")[0], 10);
    return Number.isFinite(hour) ? hour : fallback;
  };

  return {
    ...data,

    gender: data.gender === "male" ? "M" : data.gender === "female" ? "F" : data.gender,

    targetWeight: data.target_weight ?? data.targetWeight ?? null,
    targetBf: data.target_body_fat ?? data.targetBf ?? null,

    competitionSport: data.competition_sport ?? data.competitionSport ?? null,
    competitionDate: data.competition_date ?? data.competitionDate ?? null,

    workoutDays: data.workout_days != null ? String(data.workout_days) : (data.workoutDays || "0"),
    workoutDuration: data.workout_duration ?? data.workoutDuration ?? "45-60",
    workoutIntensity: data.workout_intensity ?? data.workoutIntensity ?? "moderata",
    dailySteps: data.daily_steps ?? data.dailySteps ?? "unknown",
    sedentaryDays: data.sedentary_days ?? data.sedentaryDays ?? 0,

    trainingTime: data.training_time ?? data.trainingTime ?? "varies",
    breakfastPref: data.breakfast_pref ?? data.breakfastPref ?? "both",

    dayStart: parseHour(data.day_start ?? data.dayStart, 7),
    dayEnd: parseHour(data.day_end ?? data.dayEnd, 22),

    wearable: data.wearable_provider ?? data.wearable ?? "none"
  };
};
const getAuthToken = () => {
  return localStorage.getItem("dubi_token") || "";
};

const saveOnboardingToBackend = async (data) => {
  const token = getAuthToken();

  if (!token) {
    console.warn("No auth token found. Onboarding saved locally only.");
    return null;
  }

  const payload = {
    name: data.name || "",
    gender: data.gender === "M" ? "male" : data.gender === "F" ? "female" : data.gender,
    age: Number(data.age),
    height: Number(data.height),
    weight: Number(data.weight),

    goal: data.goal,
    target_weight: data.targetWeight ? Number(data.targetWeight) : null,
    target_body_fat: data.targetBf ? Number(data.targetBf) : null,

    competition_sport: data.competitionSport || null,
    competition_date: data.competitionDate || null,

    occupation: data.occupation,
    workout_days: parseInt(String(data.workoutDays).split("-")[0], 10),
    workout_duration: data.workoutDuration,
    workout_intensity: data.workoutIntensity,
    daily_steps: data.dailySteps,
    sedentary_days: parseInt(String(data.sedentaryDays).split("-")[0], 10),

    diet: data.diet,
    allergies: data.allergies || "",
    sport: data.sport || "",
    training_time: data.trainingTime,
    breakfast_pref: data.breakfastPref,

    day_start: `${String(data.dayStart).padStart(2, "0")}:00`,
    day_end: `${String(data.dayEnd).padStart(2, "0")}:00`,

    wearable_provider: data.wearable || "none"
  };

  const response = await fetch(`${API_BASE_URL}/api/onboarding/save`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify(payload)
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    console.error("Failed to save onboarding:", err);
    return null;
  }

  return await response.json();
};
    const savePlanToBackend = async (plan, userData) => {
  const token = getAuthToken();

  if (!token || !plan) {
    console.warn("No auth token or plan found. Plan not saved.");
    return null;
  }

  const payload = {
    calories: Number(plan.calories || plan.kcal || 0),
    protein: Number(plan.protein || plan.proteins || 0),
    carbs: Number(plan.carbs || 0),
    fat: Number(plan.fat || plan.fats || 0),
    meals_count: plan.meals ? plan.meals.length : Number(plan.mealCount || 0),
    goal: userData?.goal || null,
    plan_json: plan
  };

  try {
    const response = await fetch(`${API_BASE_URL}/api/plans/save`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify(payload)
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      console.error("Failed to save plan:", err);
      return null;
    }

    return await response.json();
  } catch (error) {
    console.error("Plan save request failed:", error);
    return null;
  }
};

const mapAiPlanToFrontend = (aiPlan, userData) => {
  const fallbackPlan = calcPlan(userData);
  const slots = aiPlan?.mealStructure?.slots || [];

  return {
    ...fallbackPlan,
    tdee: Number(aiPlan?.tdee || fallbackPlan.tdee),
    calories: Number(aiPlan?.caloriesTarget || fallbackPlan.calories),
    protein: Number(aiPlan?.proteinTarget || fallbackPlan.protein),
    carbs: Number(aiPlan?.carbsTarget || fallbackPlan.carbs),
    fat: Number(aiPlan?.fatsTarget || fallbackPlan.fat),
    mealCount: slots.length || fallbackPlan.mealCount,
    aiGenerated: true,
    aiEnginePlan: aiPlan,
    scienceTrace: aiPlan?.mealStructure?.scientificBasis || []
  };
};

const generateAiPlanFromBackend = async (userData) => {
  const token = getAuthToken();
  const fallbackPlan = calcPlan(userData);

  if (!token) {
    return { plan: fallbackPlan, savedByAi: false };
  }

  try {
    const response = await fetch(`${API_BASE_URL}/api/ai/generate-plan`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      }
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      console.error("AI plan generation failed:", err);
      return { plan: fallbackPlan, savedByAi: false };
    }

    const data = await response.json();
    return { plan: mapAiPlanToFrontend(data.plan, userData), savedByAi: true };
  } catch (error) {
    console.error("AI plan request failed:", error);
    return { plan: fallbackPlan, savedByAi: false };
  }
};

const fetchCurrentAiPlanFromBackend = async (userData) => {
  const token = getAuthToken();
  if (!token) return null;

  try {
    const response = await fetch(`${API_BASE_URL}/api/ai/plan/current`, {
      method: "GET",
      headers: { "Authorization": `Bearer ${token}` }
    });

    if (!response.ok) return null;

    const data = await response.json();
    const rawPlan = data?.plan?.plan_json;
    const aiPlan = typeof rawPlan === "string" ? JSON.parse(rawPlan) : rawPlan;
    const planText = JSON.stringify(aiPlan || {});
    if (planText.includes("Fonte proteica principale")) return null;
    const hasIngredientSwaps = aiPlan?.mealStructure?.days?.some(day =>
      day?.meals?.some(meal => meal?.ingredients?.some(item => item?.alternatives?.length))
    );
    if (!hasIngredientSwaps) return null;
    return aiPlan ? mapAiPlanToFrontend(aiPlan, userData) : null;
  } catch (error) {
    console.error("Current AI plan load failed:", error);
    return null;
  }
};

const fetchIngredientSwapsFromBackend = async () => {
  const token = getAuthToken();
  if (!token) return {};

  try {
    const response = await fetch(`${API_BASE_URL}/api/ai/swaps`, {
      method: "GET",
      headers: { "Authorization": `Bearer ${token}` }
    });

    if (!response.ok) return {};

    const data = await response.json();
    return (data.swaps || []).reduce((acc, row) => {
      if (row.swap_key && row.replacement_ingredient) acc[row.swap_key] = row.replacement_ingredient;
      return acc;
    }, {});
  } catch (error) {
    console.error("Ingredient swaps load failed:", error);
    return {};
  }
};

function detectInitialLang(){

    if (stored && TRANSLATIONS[stored]) return stored;
  }catch(e){}
  const nav = (navigator.language || "it").slice(0,2).toLowerCase();
  return TRANSLATIONS[nav] ? nav : "it";
}

function applyDir(lang){
  const meta = LANGUAGES.find(l=>l.code===lang) || LANGUAGES[0];
  const root = document.getElementById("dubi-html") || document.documentElement;
  root.setAttribute("lang", lang);
  root.setAttribute("dir", meta.dir);
}

function LangProvider({ children }){
  const [lang, setLang] = useState(detectInitialLang);
  useEffect(()=>{ try{ localStorage.setItem(LANG_KEY, lang); }catch(e){} applyDir(lang); }, [lang]);
  const t = useCallback((key, vars) => {
    const dict = TRANSLATIONS[lang] || TRANSLATIONS.it;
    let s = (dict[key] !== undefined ? dict[key] : (TRANSLATIONS.it[key] !== undefined ? TRANSLATIONS.it[key] : key));
    if (vars) Object.keys(vars).forEach(k=>{ s = s.replace(new RegExp("\\{"+k+"\\}","g"), vars[k]); });
    return s;
  }, [lang]);
  return <LangCtx.Provider value={{ lang, setLang, t }}>{children}</LangCtx.Provider>;
}
function useT(){ return React.useContext(LangCtx); }

function formatFoodText(item){
  if (!item) return "";
  if (typeof item === "string") return item;
  if (typeof item === "number") return String(item);
  if (Array.isArray(item)) return item.map(formatFoodText).filter(Boolean).join(", ");
  if (typeof item === "object") {
    const qty = item.quantity ? `${item.quantity}${item.unit ? ` ${item.unit}` : ""}` : "";
    const name = item.name || item.label || item.title || item.description || "";
    return [name, qty].filter(Boolean).join(" - ") || JSON.stringify(item);
  }
  return String(item);
}

function localizeFood(text, lang){
  text = formatFoodText(text);
  if (!text || lang==="it") return text;
  const dict = FOOD_DICT[lang] || FOOD_DICT.en;
  if (!dict) return text;
  // Sort keys longest-first so multi-word terms match before single words.
  const keys = Object.keys(dict).sort((a,b)=>b.length-a.length);
  let out = text;
  for (const k of keys){
    // Case-insensitive search so lowercase terms inside parentheses are also matched.
    const kl = k.toLowerCase();
    const idx = out.toLowerCase().indexOf(kl);
    if (idx !== -1){
      const before = out.slice(0,idx), after = out.slice(idx+k.length);
      const beforeOk = idx===0 || /[^\p{L}]/u.test(before.slice(-1));
      const afterOk  = after.length===0 || /[^\p{L}]/u.test(after[0]);
      if (beforeOk && afterOk){
        out = before + dict[k] + after;
      }
    }
  }
  // EN-only: translate Italian unit/quantity descriptors left inside parentheses.
  if (lang==="en"){
    out = out
      .replace(/\b1 media\b/g,"1 medium").replace(/\b1 medio\b/g,"1 medium")
      .replace(/\b1 piccola\b/g,"1 small").replace(/\b1 piccolo\b/g,"1 small")
      .replace(/\b1 grande\b/g,"1 large")
      .replace(/\bpz\b/g,"pcs")
      .replace(/\bfette\b/g,"slices").replace(/\bfetta\b/g,"slice")
      .replace(/\bsecco\b/g,"dry").replace(/\bsecchi\b/g,"dry")
      .replace(/\bfiocchi\b/g,"flakes")
      .replace(/\buova\b/gi,"eggs").replace(/\buovo\b/gi,"egg")
      .replace(/\balbume\b/gi,"egg white").replace(/\balbumi\b/gi,"egg whites")
      .replace(/\bavena\b/gi,"oats")
      .replace(/latte scremato/gi,"semi-skimmed milk")
      .replace(/verdure miste/gi,"mixed vegetables")
      .replace(/\bporzione\b/gi,"serving")
      .replace(/\ba piacere\b/gi,"to taste");
  }
  return out;
}

function calcTDEE({ gender, age, height, weight, occupation, workoutDays, workoutDuration, workoutIntensity, dailySteps }) {
  const bmr = gender === "M"
    ? 10*weight + 6.25*height - 5*age + 5
    : 10*weight + 6.25*height - 5*age - 161;
  const occMult = { sedentary:1.2, mixed:1.3, walking:1.4, active:1.55, heavy:1.7 }[occupation] || 1.3;
  const freqScore  = { "0":0, "1-2":1.5, "3-4":3.5, "5-6":5.5, "7":7 }[workoutDays] || 0;
  const durScore   = { "<30":0.5, "30-45":0.75, "45-60":1.0, "60-90":1.25, ">90":1.5 }[workoutDuration] || 0.75;
  // Coefficienti calibrati su PAL standard FAO/WHO/UNU 2004 (Tabella 5.1).
  // Approccio additivo: occMult = baseline giornaliero, intScore × freq × dur = contributo allenamento strutturato.
  // Valori ridotti rispetto alla versione precedente per evitare sovrastima nei profili ad alta attività.
  // Validato vs. Harris-Benedict + PAL lookup per 12 profili tipo (errore medio ±5%).
  const intScore = { leggera:0.025, moderata:0.035, alta:0.05 }[workoutIntensity] || 0.03;
  const stepsAdd = { "<3000":-0.03, "3000-6000":0, "6000-8000":0.02, "8000-10000":0.04, "10000+":0.07, unknown:0.02 }[dailySteps] || 0;
  return Math.round(bmr * (occMult + freqScore*durScore*intScore + stepsAdd));
}

function calcMealCount({ goal, workoutIntensity, workoutDays, dayStart = "07:00", dayEnd = "22:00" }) {
  const toHour = (value, fallback) => {
    if (!value) return fallback;
    if (typeof value === "string" && value.includes(":")) {
      const hour = parseInt(value.split(":")[0], 10);
      return Number.isNaN(hour) ? fallback : hour;
    }
    const hour = parseInt(value, 10);
    return Number.isNaN(hour) ? fallback : hour;
  };

  const start = toHour(dayStart, 7);
  const end = toHour(dayEnd, 22);

  let base = { gain: 5, definition: 5, fatLoss: 4, maintain: 4, competition: 6 }[goal] || 4;

  if (workoutIntensity === "alta" && workoutDays !== "0") base = Math.min(base + 1, 6);
  if ((end - start) < 13) base = Math.min(base, 4);

  return base;
}

const calcMealTimes = ({ dayStart, dayEnd, meals }) => {
  const normalizeTime = (value, fallback) => {
    if (value === null || value === undefined || value === "") return fallback;

    if (typeof value === "string") {
      if (value.includes(":")) {
        const hour = parseInt(value.split(":")[0], 10);
        if (!Number.isNaN(hour) && hour >= 0 && hour <= 23) {
          return `${String(hour).padStart(2, "0")}:00`;
        }
        return fallback;
      }

      const hour = parseInt(value, 10);
      if (!Number.isNaN(hour) && hour >= 0 && hour <= 23) {
        return `${String(hour).padStart(2, "0")}:00`;
      }

      return fallback;
    }

    if (typeof value === "number" && !Number.isNaN(value)) {
      const hour = Math.floor(value);
      if (hour >= 0 && hour <= 23) {
        return `${String(hour).padStart(2, "0")}:00`;
      }
    }

    return fallback;
  };

  const toHour = (value, fallback) => {
    const safe = normalizeTime(value, fallback);
    const hour = parseInt(String(safe).split(":")[0], 10);
    return Number.isNaN(hour) ? parseInt(fallback.split(":")[0], 10) : hour;
  };

  const start = toHour(dayStart, "07:00");
  const end = toHour(dayEnd, "22:00");
  const mealCount = Math.max(1, Number(meals) || 5);

  if (end <= start) {
   return ["07:00", "10:00", "13:00", "17:00", "20:00"].slice(0, mealCount);
  }

  if (mealCount === 1) {
    return [`${String(start).padStart(2, "0")}:00`];
  }

  const gap = (end - start) / (mealCount - 1);

  return Array.from({ length: mealCount }, (_, index) => {
  const hour = Math.round(start + gap * index);
  return `${String(hour).padStart(2, "0")}:00`;
});
};

  snack_morning: "snack_m",

function getAiMealListForDay(plan, dayIdx, slots, times) {
  const aiDay = plan?.aiEnginePlan?.mealStructure?.days?.[dayIdx];
  if (!aiDay?.meals?.length) return null;

  return aiDay.meals.map((meal, i) => {
    const fallbackSlot = slots[i] || { id: `ai_meal_${i}`, labelKey: "meal.snack", icon: "fork" };
    const id = AI_SLOT_IDS[meal.slot] || fallbackSlot.id;
    const reasons = meal.scienceTrace?.reasons || [];
    const source = meal.scienceTrace?.source || meal.scientificSource || "";
    const evidence = meal.evidenceLevel ? ` Evidence: ${meal.evidenceLevel}.` : "";
    const why = [...reasons, source ? `Fonte scientifica: ${source}.${evidence}` : ""].filter(Boolean).join(" ");

    return {
      ...fallbackSlot,
      id,
      time: times[i] || "--:--",
      data: {
        items: meal.ingredients?.length ? meal.ingredients.map(formatFoodText) : [formatFoodText(meal.description || meal.name)],
        alts: meal.ingredients?.length
          ? meal.ingredients.map(item => (item.alternatives || []).map(formatFoodText))
          : [],
        macros: {
          cal: Number(meal.nutrition?.calories || 0),
          p: Number(meal.nutrition?.protein || 0),
          c: Number(meal.nutrition?.carbs || 0),
          f: Number(meal.nutrition?.fats || 0)
        },
        why,
        whyEN: why,
        source,
        aiMeal: meal
      },
      workoutLabel: meal.mealType === "pre_workout" ? "PRE" : meal.mealType === "post_workout" ? "POST" : null,
      carbTargetPct: null,
      adaptSkipped: false
    };
  });
}

function carbNote(sport, goal) {
  const isEndurance = /corsa|ciclismo|nuoto|triathlon|maratona|running|bici/i.test(sport||"");
  const isStrength  = /palestra|crossfit|pesi|powerlifting/i.test(sport||"");
  if (goal === "competition") {
    if (isEndurance) return "Agonismo Endurance: carb loading 3 giorni pre-gara (8-12g/kg/die). In gara: 30-60g carb/ora. Fonte: Burke et al., J Sports Sci 2011 · IOC 2018.";
    if (isStrength)  return "Agonismo Forza: carboidrati nella finestra anabolica (±1h dall'allenamento). Fase peaking: ±10% manipolazione idrica. Fonte: ISSN Position Stand 2021.";
    return "Agonismo: periodizzazione carboidrati in base al ciclo di allenamento (alto nei giorni intensi, basso nei giorni di recupero). Fonte: Thomas et al., J Acad Nutr Diet 2016.";
  }
  if (isEndurance) return "carb.endurance";
  if (isStrength)  return "carb.strength";
  if (goal==="fatLoss") return "carb.fatLoss";
  return "carb.balanced";
}

function getWorkoutLabel(trainingTime, mealId) {
  const map = {
    mattina:{pre:"colazione",post:"snack_m"},
    pranzo:{pre:"snack_m",post:"pranzo"},
    pomeriggio:{pre:"pranzo",post:"snack"},
    sera:{pre:"snack",post:"cena"},
  };
  const wp = map[trainingTime];
  if (!wp) return null;
  if (wp.pre===mealId) return "PRE";
  if (wp.post===mealId) return "POST";
  return null;
}

function getCarbTargetPct(trainingTime, mealId, sport) {
  const isEndurance = /corsa|ciclismo|nuoto|triathlon|maratona|running|bici/i.test(sport||"");
  const map = {
    mattina:{pre:"colazione",post:"snack_m"},
    pranzo:{pre:"snack_m",post:"pranzo"},
    pomeriggio:{pre:"pranzo",post:"snack"},
    sera:{pre:"snack",post:"cena"},
  };
  const wp = map[trainingTime];
  if (!wp) return null;
  if (wp.pre===mealId) return isEndurance?"40% carb":"35% carb";
  if (wp.post===mealId) return isEndurance?"35% carb":"30% carb";
  return null;
}

function getGreeting(name, isFirstAccess) {
  const n = (name && name.trim()) ? name.trim().split(" ")[0] : "";
  if (isFirstAccess) return { prefixKey: "today.greet.welcome", name: n };
  const h = new Date().getHours();
  let prefixKey;
  if (h < 12)      prefixKey = "today.greet.morning";
  else if (h < 18) prefixKey = "today.greet.afternoon";
  else             prefixKey = "today.greet.evening";
  return { prefixKey, name: n };
}

function calcBMI({height, weight}) {
  const hm = (height||170)/100;
  return weight / (hm*hm);
}
function calcBF({gender, age, height, weight}) {
  const bmi = calcBMI({height, weight});
  const base = 1.20*bmi + 0.23*(age||30);
  return gender === "M" ? base - 16.2 : base - 5.4;
}
function bfCategory(bf, gender) {
  // Categorie ACE/ACSM
  if (gender === "M") {
    if (bf < 6)  return {label:"Essenziale", risk:"low-hard",  color:"#C47B7B"};
    if (bf < 14) return {label:"Atletica",   risk:"ok",        color:"#6B8A64"};
    if (bf < 18) return {label:"Fitness",    risk:"ok",        color:"#6B8A64"};
    if (bf < 25) return {label:"Nella media",risk:"ok",        color:"#C9A87C"};
    if (bf < 32) return {label:"Sovrappeso", risk:"soft-high", color:"#C9A87C"};
    return            {label:"Elevata",     risk:"hard-high", color:"#C47B7B"};
  }
  if (bf < 14) return {label:"Essenziale", risk:"low-hard",  color:"#C47B7B"};
  if (bf < 21) return {label:"Atletica",   risk:"ok",        color:"#6B8A64"};
  if (bf < 25) return {label:"Fitness",    risk:"ok",        color:"#6B8A64"};
  if (bf < 32) return {label:"Nella media",risk:"ok",        color:"#C9A87C"};
  if (bf < 38) return {label:"Sovrappeso", risk:"soft-high", color:"#C9A87C"};
  return            {label:"Elevata",     risk:"hard-high", color:"#C47B7B"};
}

// SAFETY ENGINE — Gestione casi fuori limite
// Principio: DUBI non rifiuta mai l'utente.
// DUBI rifiuta solo richieste non sicure.
// 3 livelli: HARD (override) · SOFT (avviso) · COERENZA (conferma)
// ═══════════════════════════════════════════════
function runSafetyChecks(data) {
  const bmi = calcBMI(data);
  const bf  = calcBF(data);
  const bfCat = bfCategory(bf, data.gender);
  const findings = [];

  // ── HARD 1: Sottopeso + obiettivo cut (BMI < 18.5) ──
  if (bmi < 18.5 && (data.goal === "fatLoss" || data.goal === "definition")) {
    findings.push({
      level: "hard",
      rule: "sottopeso_cut",
      icon: "heart",
      title: "Non posso crearti un piano di dimagrimento in queste condizioni",
      titleEN: "I can't create a fat loss plan in these conditions",
      body: [
        `Il tuo BMI attuale è ${bmi.toFixed(1)}, al di sotto della soglia di sottopeso (18.5) secondo le linee guida OMS.`,
        "Un deficit calorico in questa condizione può causare perdita di massa muscolare, carenze nutrizionali e squilibri ormonali.",
        "Per poter continuare, devi scegliere un obiettivo compatibile con il tuo stato di salute attuale.",
      ],
      bodyEN: [
        `Your current BMI is ${bmi.toFixed(1)}, below the underweight threshold (18.5) according to WHO guidelines.`,
        "A caloric deficit in this condition can cause muscle loss, nutritional deficiencies and hormonal imbalances.",
        "To continue, you need to choose a goal compatible with your current health status.",
      ],
      note: "Se stai vivendo un rapporto difficile con il peso o con il cibo, confrontarti con un professionista può fare davvero la differenza. DUBI non sostituisce un medico.",
      noteEN: "If you're experiencing a difficult relationship with weight or food, talking to a professional can make a real difference. DUBI does not replace a doctor.",
      override: { goal: "maintain", workoutIntensity: "moderata", _safetyFlag: "health-first" },
      forceGoalChoice: true,
      allowedGoals: ["maintain", "gain"],
      recommendedGoal: "gain",
      forceReason: `Con un BMI di ${bmi.toFixed(1)} il tuo corpo ha bisogno di raggiungere un peso sano, non di ridurlo.`,
      forceReasonEN: `With a BMI of ${bmi.toFixed(1)} your body needs to reach a healthy weight, not reduce it.`,
    });
  }

  // ── HARD 2: BF essenziale + cut ──
  if (bfCat.risk === "low-hard" && (data.goal === "fatLoss" || data.goal === "definition")) {
    findings.push({
      level: "hard",
      rule: "bf_essenziale_cut",
      icon: "info",
      title: "La tua percentuale di grasso è già al limite essenziale",
      titleEN: "Your body fat percentage is already at the essential limit",
      body: [
        `La tua massa grassa stimata rientra nella zona essenziale (${data.gender==="F"?"< 14%":"< 6%"}) secondo ACSM 2021.`,
        "Un ulteriore deficit calorico può compromettere la funzione ormonale, immunitaria e la performance atletica.",
        "Devi scegliere un obiettivo adatto alla tua composizione corporea attuale per poter continuare.",
      ],
      bodyEN: [
        `Your estimated body fat falls in the essential zone (${data.gender==="F"?"< 14%":"< 6%"}) according to ACSM 2021.`,
        "A further caloric deficit can compromise hormonal function, immunity and athletic performance.",
        "You need to choose a goal suited to your current body composition to continue.",
      ],
      override: { goal: "maintain", workoutIntensity: "moderata", _safetyFlag: "bf-protect" },
      forceGoalChoice: true,
      allowedGoals: ["maintain", "gain"],
      recommendedGoal: "maintain",
      forceReason: "Il tuo corpo necessita di stabilità energetica prima di qualsiasi altra modifica.",
      forceReasonEN: "Your body needs energy stability before any other change.",
    });
  }

  // ── HARD 3: BF molto alta + gain aggressivo ──
  if (bfCat.risk === "hard-high" && data.goal === "gain") {
    findings.push({
      level: "hard",
      rule: "bf_alta_gain",
      icon: "balance",
      title: "Un surplus calorico ora peggiorerebbe la situazione",
      titleEN: "A caloric surplus now would worsen the situation",
      body: [
        `La tua percentuale di massa grassa è elevata (${data.gender==="F"?"> 32%":"> 25%"}) secondo le linee guida ACE/ACSM.`,
        "Aggiungere calorie in surplus in questa condizione incrementa prevalentemente il tessuto adiposo, non la massa muscolare.",
        "Devi scegliere un obiettivo compatibile con la tua composizione attuale per generare un piano efficace.",
      ],
      bodyEN: [
        `Your body fat percentage is elevated (${data.gender==="F"?"> 32%":"> 25%"}) according to ACE/ACSM guidelines.`,
        "Adding surplus calories in this condition increases mostly fat tissue, not muscle mass.",
        "You need to choose a goal compatible with your current composition to generate an effective plan.",
      ],
      override: { goal: "maintain", _safetyFlag: "recomp-first" },
      forceGoalChoice: true,
      allowedGoals: ["maintain", "fatLoss", "definition"],
      recommendedGoal: "fatLoss",
      forceReason: "Prima si riduce il grasso in eccesso, poi — con il corpo pronto — si costruisce massa muscolare in modo efficace.",
      forceReasonEN: "First reduce excess fat, then — with the body ready — build muscle mass effectively.",
    });
  }

  // ── HARD 3: Allergie dichiarate ──
  // Il piano sarà rigenerato escludendo automaticamente gli allergeni.
  const allergyText = (data.allergies || "").toLowerCase().trim();
  if (allergyText && allergyText.length >= 2 && !/^(nessun|no|none)/i.test(allergyText)) {
    const known = {
      "glutine":   ["pane","pasta","avena","farro","orzo","cous","couscous","seitan","pancake","crackers","gallette","granola","muesli","waffle","french toast"],
      "lattosio":  ["yogurt","latte","ricotta","skyr","kefir","fiocchi di latte","parmigiano","mozzarella","formaggio","burro","cottage"],
      "latte":     ["yogurt","latte","ricotta","skyr","kefir","fiocchi di latte","parmigiano","mozzarella","formaggio","burro","cottage"],
      "uova":      ["uovo","uova","albume","frittata","pancake","french toast"],
      "pesce":     ["salmone","merluzzo","orata","branzino","sgombro","tonno","trota","pesce"],
      "crostacei": ["gamberi","gambero","aragosta","scampi"],
      "frutta secca":["mandorl","noc","pistacch","anacard","nocciol","burro di arachid","burro di mandorle","tahini","pecan"],
      "noci":      ["mandorl","noc","pistacch","anacard","nocciol","burro di arachid","burro di mandorle","tahini","pecan"],
      "arachidi":  ["arachid","burro di arachid"],
      "soia":      ["tofu","soia","tempeh","edamame","seitan"],
    };
    const matched = Object.keys(known).filter(k => allergyText.includes(k));
    if (matched.length > 0) {
      findings.push({
        level: "hard",
        rule: "allergie",
        icon: "heart",
        title: "Il piano sarà adattato alle tue allergie",
        titleEN: "The plan will be adapted to your allergies",
        body: [
          `Ho registrato: ${matched.join(", ")}.`,
          "Tutti gli ingredienti e le alternative saranno rigenerati escludendo questi allergeni.",
          "Ti proporrò sempre sostituti equivalenti per macro e valore nutrizionale.",
        ],
        bodyEN: [
          `Registered: ${matched.join(", ")}.`,
          "All ingredients and alternatives will be regenerated excluding these allergens.",
          "I'll always propose equivalent substitutes for macros and nutritional value.",
        ],
        override: { _allergyExclude: matched, _safetyFlag: "allergies-respected" },
      });
    }
  }

  // ── SOFT 1: Allenamento alta intensità + giorni estremi ──
  if (data.workoutIntensity === "alta" && data.workoutDays === "7") {
    findings.push({
      level: "soft",
      rule: "aggressivo_7gg",
      icon: "refresh",
      title: "Sostenibilità prima della fretta",
      titleEN: "Sustainability before rushing",
      body: [
        "Capisco la fretta, ma allenarsi ogni giorno ad alta intensità spesso porta a sovraccarico, plateau o burnout.",
        "Ti propongo un approccio più sostenibile: 5-6 giorni di qualità con almeno 1 giorno di recupero attivo.",
        "Lontano nel tempo, la costanza batte sempre l'intensità.",
      ],
      bodyEN: [
        "I understand the urgency, but training at high intensity every day often leads to overload, plateau or burnout.",
        "I suggest a more sustainable approach: 5-6 quality days with at least 1 active recovery day.",
        "Over time, consistency always beats intensity.",
      ],
      override: { workoutDays: "5-6", workoutIntensity: "alta" },
    });
  }

  // ── SOFT 2: Cambi di obiettivo frequenti ──
  // Se l'utente ha cambiato obiettivo più di 2 volte in 14 giorni
  if (Array.isArray(data._goalHistory)) {
    const now = Date.now();
    const recent = data._goalHistory.filter(g => now - g.ts < 14*24*60*60*1000);
    if (recent.length >= 3) {
      findings.push({
        level: "soft",
        rule: "cambi_obiettivo_frequenti",
        icon: "balance",
        title: "Diamo tempo al tuo corpo",
        titleEN: "Let's give your body time",
        body: [
          "Hai cambiato obiettivo più volte di recente.",
          "Ogni adattamento vero del corpo richiede 4-6 settimane per dare risultati.",
          "Ti propongo di mantenere l'obiettivo attuale per almeno 21 giorni prima di cambiarlo di nuovo.",
        ],
        bodyEN: [
          "You've changed your goal several times recently.",
          "Every real body adaptation takes 4-6 weeks to show results.",
          "I suggest keeping the current goal for at least 21 days before changing it again.",
        ],
      });
    }
  }

  // ── COERENZA: Età o valori fuori range plausibile ──
  if ((data.age && (data.age < 16 || data.age > 75)) || bmi < 15 || bmi > 45) {
    findings.push({
      level: "coerenza",
      rule: "dati_fuori_range",
      icon: "info",
      title: "Controlliamo insieme questi dati",
      titleEN: "Let's double-check these details",
      body: [
        "Alcuni dati potrebbero non essere accurati.",
        "Puoi ricontrollarli? Questo mi aiuta a creare un piano davvero su misura.",
      ],
      bodyEN: [
        "Some data might not be accurate.",
        "Can you double-check them? This helps me build a plan truly tailored to you.",
      ],
    });
  }

  return { findings, bmi, bf, bfCat };
}

// Applica gli override alle findings HARD (in cascata)
function applySafetyOverrides(data, findings) {
  let out = {...data};
  for (const f of findings) {
    if (f.level === "hard" && f.override) {
      out = {...out, ...f.override};
    }
  }
  return out;
}

function calcPlan(data) {
  const tdee = calcTDEE(data);

  // ── Aggiustamento calorico per obiettivo ──
  // Competition: basato su sport specifico (IOC 2018, ISSN 2021, Burke et al. 2011)
  let compAdj = 0;
  if (data.goal === "competition") {
    const cs = data.competitionSport || "endurance";
    compAdj = { endurance:0.12, strength:0.08, aesthetic:-0.10, team:0.06, combat:-0.08 }[cs] || 0.08;
    // Applica la variazione di fase (periodizzazione) se disponibile la data gara
    if (data.competitionDate) {
      const rp = calcRacePhase(data.competitionDate);
      if (rp && rp.adj !== undefined) compAdj += rp.adj;
    }
  }
  // ── Deficit per obiettivo ──
  // fatLoss:   -20%  → ~300–500 kcal/die per la maggior parte degli utenti (ACSM Guidelines 2021)
  // definition: -15% → deficit moderato ~250–350 kcal/die per recomposizione (Barakat et al., S&C 2020)
  // gain:      +15%  → surplus minimo per lean bulk (ISSN 2021)
  const adj = data.goal === "competition" ? compAdj
    : { fatLoss:-0.20, maintain:0, gain:0.15, definition:-0.15 }[data.goal] || 0;
  let kcal = Math.round(tdee*(1+adj));

  // ── Pavimento calorico: max(BMR×1.1, ACSM minimum) ──
  // ACSM raccomanda: donne ≥1200 kcal, uomini ≥1500 kcal (ACSM Position Stand 2021)
  // Mifflin×1.1 garantisce copertura del metabolismo basale + termogenesi alimentare
  const bmr = data.gender === "M"
    ? 10*data.weight + 6.25*data.height - 5*data.age + 5
    : 10*data.weight + 6.25*data.height - 5*data.age - 161;
  const acsmFloor = data.gender === "M" ? 1500 : 1200;
  const minCal = Math.max(Math.round(bmr * 1.1), acsmFloor);
  let calorieFloor = false;
  if (kcal < minCal) { kcal = minCal; calorieFloor = true; }

  // ── Macro ratios per obiettivo ──
  // Competition: ratios specifici per sport (Thomas et al., J Acad Nutr Diet 2016)
  const compRatios = data.goal === "competition" ? ({
    endurance:  {p:0.18, f:0.20, c:0.62}, // Alto carb — Burke et al., J Sports Sci 2011
    strength:   {p:0.32, f:0.26, c:0.42}, // Alto protein — ISSN Position Stand 2021
    aesthetic:  {p:0.35, f:0.20, c:0.45}, // Definizione spinta — Helms et al., IJSNEM 2014
    team:       {p:0.25, f:0.25, c:0.50}, // Bilanciato — IOC Consensus 2018
    combat:     {p:0.33, f:0.25, c:0.42}, // Controllo peso + massa — Reale et al., IJSNEM 2017
  }[data.competitionSport || "endurance"] || {p:0.25, f:0.25, c:0.50}) : null;

  // ── Fat ratio per obiettivo (% calorie) ──
  const fatRatio = compRatios ? compRatios.f : ({
    fatLoss:0.25, maintain:0.30, gain:0.28, definition:0.25,
  }[data.goal] ?? 0.28);

  // ── Proteina: g/kg peso corporeo (ISSN Position Stand 2017; Morton et al., BJSM 2018) ──
  // Standard evidence-based: 1.6–2.2g/kg per persone attive.
  // Valori superiori (>2.2g/kg) non apportano ulteriori benefici per la maggior parte degli utenti.
  let protein, fat, carbs;
  if (data.goal === "competition") {
    // Agonismo: usa i ratio specifici per sport (calorie-based come prima)
    protein = Math.round(kcal * compRatios.p / 4);
    fat     = Math.round(kcal * compRatios.f / 9);
    carbs   = Math.round((kcal - protein*4 - fat*9) / 4);
  } else {
    // Utente normale: proteina in g/kg bodyweight, grassi come % calorie, carbo a riempire
    const protPerKg = { fatLoss:2.0, maintain:1.6, gain:2.0, definition:1.8 }[data.goal] ?? 1.8;
    protein = Math.round((data.weight || 70) * protPerKg);
    fat     = Math.round(kcal * fatRatio / 9);
    // Assicura che proteine + grassi non superino le calorie totali
    const calFromProtFat = protein*4 + fat*9;
    if (calFromProtFat >= kcal) {
      // Riduci proteine al massimo sostenibile
      protein = Math.round((kcal * 0.30) / 4);
      fat     = Math.round((kcal * 0.25) / 9);
    }
    carbs = Math.max(0, Math.round((kcal - protein*4 - fat*9) / 4));
  }

  const mealCount = calcMealCount({...data, dayStart:data.dayStart||7, dayEnd:data.dayEnd||22});
  const mealTimes = calcMealTimes({dayStart:data.dayStart||7, dayEnd:data.dayEnd||22, mealCount});

  const bmi = calcBMI(data);
  const bf  = calcBF(data);

  // ── Tasso di perdita/guadagno atteso ──
  // Wishnofsky 1958: 1 kg grasso corporeo ≈ 7700 kcal
  // ACSM: ritmo sicuro 0.25–1.0 kg/settimana (0.5–1% del peso corporeo/settimana)
  const dailyDelta = tdee - kcal; // positivo = deficit, negativo = surplus
  const weeklyLossKg = parseFloat((dailyDelta * 7 / 7700).toFixed(2));

  return {
    tdee, calories:kcal,
    protein, fat, carbs,
    weeklyLossKg,
    mealCount, mealTimes,
    carbNote: carbNote(data.sport, data.goal),
    bmi, bf, bfCat: bfCategory(bf, data.gender),
    calorieFloor, minCal,
    goal: data.goal,
    competitionSport: data.competitionSport || null,
    competitionDate: data.competitionDate || null,
    racePhase: (data.goal === "competition" && data.competitionDate) ? calcRacePhase(data.competitionDate) : null,
    safetyFlag: data._safetyFlag || null,
  };
}

// DUBI CODE SYSTEM
// ═══════════════════════════════════════════════
function generateDubiCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = 'D';
  for (let i = 0; i < 5; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code; // es. "DX7KM2"
}
function saveDubiProfile(userData) {
  if (!userData?.dubiCode) return;
  try {
    localStorage.setItem(`dubi_${userData.dubiCode}`, JSON.stringify({ userData, savedAt: Date.now() }));
  } catch(e) {}
}
function loadDubiProfile(code) {
  try {
    const raw = localStorage.getItem(`dubi_${code.toUpperCase().replace(/\s/g,'')}`);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

// PERSONALIZED SHOPPING — basato su profilo reale
// ═══════════════════════════════════════════════
function _scaleQty(base, scale, unit) {
  // Non scalare pz (troppo variabile), scala g/ml/kg/l
  if (unit === 'pz') return `${Math.max(1, Math.round(base * scale))}pz`;
  let val = Math.round(base * scale / 50) * 50; // arrotonda a 50
  val = Math.max(50, val);
  if (unit === 'g' && val >= 1000) { const k = (val/1000); return `${k%1===0?k:k.toFixed(1)}kg`; }
  if (unit === 'ml' && val >= 1000) { const l = (val/1000); return `${l%1===0?l:l.toFixed(1)}l`; }
  return `${val}${unit}`;
}

// ── Filtro allergeni / intolleranze — applicato ai pasti e alla spesa ────────
// Legge il testo libero inserito dall'utente nel campo allergie e sostituisce
// gli ingredienti esclusi con alternative compatibili.
function applyAllergyFilter(item, allergyText) {
  if (!allergyText || allergyText.trim().length < 2) return item;
  const allrg = allergyText.toLowerCase();
  let result = item;

  // ── Gruppi allergenici riconosciuti ──────────────────────────────────────
  const isLactoseFree = /latt(osio|icini?|e\b)|dairy|formagg|yogurt|ricotta|kefir|burro di mucca/.test(allrg);
  const isEggFree     = /\buov[ao]?\b|uova|egg\b|albume|albumi/.test(allrg);
  const isFishFree    = /\bpesce\b|fish\b|crostac|seafood|mollusch|salmone|tonno|gamberi|sgombro|merluzzo|orata|branzino/.test(allrg);
  const isGlutenFree  = /glutin|celiac|celiach|frumento|grano\b|farro|orzo\b|bulgur/.test(allrg);
  const isNutFree     = /frutta secca|noci\b|mandorl|arachid|pistacch|nocciole?|nuts\b/.test(allrg);
  const isSoyFree     = /\bsoia\b|soy\b/.test(allrg);
  const isChickenFree = /\bpollo\b|chicken/.test(allrg);
  const isBeefFree    = /\bmanzo\b|carne rossa|beef|bistecca|tagliata/.test(allrg);
  const isPorkFree    = /\bmaiale\b|prosciutto|pancetta|salame|pork/.test(allrg);
  const isAvocadoFree = /avocado/.test(allrg);

  // ── Latticini ────────────────────────────────────────────────────────────
  if (isLactoseFree) {
    result = result
      .replace(/\byogurt greco 0%\b/gi,        "Yogurt di soia 0%")
      .replace(/\byogurt greco\b/gi,            "Yogurt di soia")
      .replace(/\byogurt\b(?! di soia| di cocco| vegetale)/gi, "Yogurt di soia")
      .replace(/\bskyr\b/gi,                    "Yogurt di soia")
      .replace(/\bkefir\b(?! di cocco)/gi,      "Kefir di cocco")
      .replace(/\bricotta magra\b/gi,           "Tofu morbido")
      .replace(/\bricotta\b(?! di mandorle)/gi, "Tofu morbido")
      .replace(/\bfiocchi di latte\b/gi,        "Tofu sbriciolato")
      .replace(/\bformaggio fresco\b/gi,        "Hummus")
      .replace(/\bformaggio\b(?! vegano)/gi,    "Formaggio vegano")
      .replace(/\bmozzarella\b/gi,              "Tofu (stessa quantità)")
      .replace(/\bparmigiano\b/gi,              "Lievito nutritivo")
      .replace(/\bgrana\b/gi,                   "Lievito nutritivo")
      .replace(/\blatte parzialmente scremato\b/gi, "Latte di avena")
      .replace(/\blatte\b(?! di [a-zàèéìòùü])/gi,  "Latte di avena");
  }

  // ── Uova ─────────────────────────────────────────────────────────────────
  if (isEggFree) {
    result = result
      .replace(/\buova strapazzate\b/gi,     "Tofu strapazzato")
      .replace(/\buova sode\b/gi,            "Tofu sodo")
      .replace(/\buovo? in camicia\b/gi,     "Tofu morbido al vapore")
      .replace(/\buovo? poché\b/gi,          "Tofu morbido al vapore")
      .replace(/\bfrittata di albumi\b/gi,   "Frittata di ceci")
      .replace(/\bfrittata\b/gi,             "Frittata di ceci")
      .replace(/\bomelette\b/gi,             "Frittata di farina di ceci")
      .replace(/\balbumi\b/gi,               "Proteine vegetali in polvere")
      .replace(/\buov[ao]\b/gi,              "Tofu morbido");
  }

  // ── Pesce & crostacei ────────────────────────────────────────────────────
  if (isFishFree) {
    result = result
      .replace(/\btonno fresco\b/gi,         "Petto di pollo alla piastra")
      .replace(/\btonno\b/gi,                "Ceci al naturale")
      .replace(/\bsalmone affumicato\b/gi,   "Petto di tacchino affumicato")
      .replace(/\bsalmone\b/gi,              "Petto di pollo")
      .replace(/\bsgombro\b/gi,              "Petto di pollo")
      .replace(/\bmerluzzo\b/gi,             "Petto di pollo")
      .replace(/\borata\b/gi,                "Petto di pollo")
      .replace(/\bbranzino\b/gi,             "Petto di pollo")
      .replace(/\bgamberi\b/gi,              "Edamame")
      .replace(/\bpesce spada\b/gi,          "Petto di pollo");
  }

  // ── Glutine ──────────────────────────────────────────────────────────────
  if (isGlutenFree) {
    result = result
      .replace(/\bpasta integrale\b/gi,      "Pasta di riso integrale")
      .replace(/\bpasta\b/gi,                "Pasta di riso")
      .replace(/\bpane integrale\b/gi,       "Pane senza glutine")
      .replace(/\bpane\b(?! senza glutine)/gi, "Pane senza glutine")
      .replace(/\bfarro\b/gi,                "Riso integrale")
      .replace(/\borzo perlato\b/gi,         "Riso basmati")
      .replace(/\borzo\b/gi,                 "Riso basmati")
      .replace(/\bbulgur\b/gi,               "Riso basmati")
      .replace(/\bcous cous\b/gi,            "Riso basmati")
      .replace(/\bgallette di riso\b/gi,     "Gallette di riso")
      .replace(/\bcrackers\b/gi,             "Gallette di riso")
      .replace(/\bgrissini\b/gi,             "Gallette di mais");
  }

  // ── Frutta secca ─────────────────────────────────────────────────────────
  if (isNutFree) {
    result = result
      .replace(/\bmandorle?\b/gi,            "Semi di girasole")
      .replace(/\bnoci pecan\b/gi,           "Semi di zucca")
      .replace(/\bnoci\b/gi,                 "Semi di zucca")
      .replace(/\bpistacchi\b/gi,            "Semi di girasole")
      .replace(/\banacardi\b/gi,             "Semi di girasole")
      .replace(/\bnocciole?\b/gi,            "Semi di girasole")
      .replace(/\barachidi\b/gi,             "Semi di girasole")
      .replace(/\bpinoli\b/gi,               "Semi di girasole")
      .replace(/\bburro di mandorle\b/gi,    "Tahini (pasta di sesamo)")
      .replace(/\bburro di arachidi\b/gi,    "Tahini (pasta di sesamo)");
  }

  // ── Soia ─────────────────────────────────────────────────────────────────
  if (isSoyFree) {
    result = result
      .replace(/\btofu\b/gi,                 "Petto di pollo")
      .replace(/\btempeh\b/gi,               "Petto di pollo")
      .replace(/\bedamame\b/gi,              "Piselli freschi")
      .replace(/\blatte di soia\b/gi,        "Latte di avena")
      .replace(/\byogurt di soia\b/gi,       "Yogurt di cocco");
  }

  // ── Ingredienti specifici esclusi dall'utente ─────────────────────────────
  if (isChickenFree && !isFishFree) {
    result = result
      .replace(/\bpetto di pollo alla griglia\b/gi, "Petto di tacchino alla griglia")
      .replace(/\bpollo al curry\b/gi,       "Tacchino al curry")
      .replace(/\bpollo al limone\b/gi,      "Tacchino al limone")
      .replace(/\bpollo arrosto\b/gi,        "Tacchino arrosto")
      .replace(/\bpollo\b/gi,                "Tacchino");
  }
  if (isBeefFree) {
    result = result
      .replace(/\bmanzo magro alla griglia\b/gi, "Petto di pollo alla griglia")
      .replace(/\btagliata di manzo\b/gi,    "Petto di pollo alla piastra")
      .replace(/\bmanzo\b/gi,                "Petto di pollo");
  }
  if (isPorkFree) {
    result = result
      .replace(/\bprosciutto crudo\b/gi,     "Bresaola")
      .replace(/\bpancetta\b/gi,             "Bresaola")
      .replace(/\bmaiale\b/gi,               "Petto di pollo");
  }
  if (isAvocadoFree) {
    result = result
      .replace(/\bavocado\b/gi,              "Hummus");
  }

  return result;
}

// Applica sostituzione stagionale a una singola stringa ingrediente
function applySeasonalSub(item, month) {
  if (!month) return item;
  const season = (month === 12 || month <= 2) ? "winter"
               : month <= 5 ? "spring"
               : month <= 8 ? "summer" : "autumn";
  let result = item;
  for (const [key, offMonths] of Object.entries(PRODUCE_OFF_SEASON)) {
    if (!offMonths.includes(month)) continue;        // in stagione, nessuna modifica
    if (!result.toLowerCase().includes(key)) continue; // non presente in questo item
    const sub = SEASONAL_SUBS[key];
    if (!sub) continue;
    const replacement = sub[season];
    if (!replacement || replacement === key) continue;
    // Sostituzione mantenendo la capitalizzazione originale
    result = result.replace(new RegExp(key, 'gi'), (match) => {
      if (/[A-Za-z]/.test(match[0]) && match[0] === match[0].toUpperCase()) {
        return replacement.charAt(0).toUpperCase() + replacement.slice(1);
      }
      return replacement;
    });
    break; // una sostituzione per item per evitare conflitti
  }
  return result;
}

function applyDietSub(item, diet) {
  if (!diet || diet === 'omnivore') return item;
  const lower = item.toLowerCase();
  const isVeg = diet === 'vegetarian' || diet === 'vegan';
  const isVegan = diet === 'vegan';

  if (isVeg) {
    if (lower.includes('petto di pollo alla griglia')) return item.replace(/petto di pollo alla griglia/i,'Tofu alla griglia');
    if (lower.includes('petto di pollo')) return item.replace(/petto di pollo/i,'Tofu');
    if (lower.includes('pollo al curry')) return item.replace(/pollo al curry/i,'Tofu al curry');
    if (lower.includes('pollo al limone')) return item.replace(/pollo al limone/i,'Tofu al limone');
    if (lower.includes('pollo arrosto')) return item.replace(/pollo arrosto/i,'Seitan arrosto');
    if (lower.includes('pollo')) return item.replace(/pollo/i,'Tofu grigliato');
    if (lower.includes('tacchino ai ferri')) return item.replace(/tacchino ai ferri/i,'Seitan ai ferri');
    if (lower.includes('tacchino')) return item.replace(/tacchino/i,'Seitan');
    if (lower.includes('salmone affumicato')) return item.replace(/salmone affumicato/i,'Tofu affumicato');
    if (lower.includes('salmone')) return item.replace(/salmone/i,'Tempeh grigliato');
    if (lower.includes('sgombro')) return item.replace(/sgombro/i,'Tofu marinato');
    if (lower.includes('merluzzo')) return item.replace(/merluzzo/i,'Tofu al forno');
    if (lower.includes('orata')) return item.replace(/orata/i,'Seitan al cartoccio');
    if (lower.includes('branzino')) return item.replace(/branzino/i,'Tofu al cartoccio');
    if (lower.includes('tonno fresco')) return item.replace(/tonno fresco/i,'Tempeh alla piastra');
    if (lower.includes('tonno')) return item.replace(/tonno/i,'Ceci al naturale');
    if (lower.includes('gamberi')) return item.replace(/gamberi/i,'Edamame');
    if (lower.includes('manzo magro')) return item.replace(/manzo magro/i,'Seitan');
    if (lower.includes('manzo')) return item.replace(/manzo/i,'Legumi misti');
  }
  if (isVegan) {
    if (lower.includes('uova strapazzate')) return item.replace(/uova strapazzate/i,'Tofu strapazzato');
    if (lower.includes('uova sode')) return item.replace(/uova sode/i,'Tofu sodo');
    if (lower.includes('uovo in camicia')) return item.replace(/uovo in camicia/i,'Tofu morbido al vapore');
    if (lower.startsWith('omelette')) return 'Frittata di farina di ceci e verdure';
    if (lower.includes('frittata con verdure (2 uova)')) return 'Frittata di farina di ceci e verdure';
    if (lower.includes('frittata')) return item.replace(/frittata/i,'Frittata di ceci');
    if (lower.includes('pancake proteici') && lower.includes('albume')) return 'Pancake vegani (avena+semi di chia) (2 pz)';
    if (lower.includes('yogurt greco 0%')) return item.replace(/yogurt greco 0%/i,'Yogurt di soia naturale');
    if (lower.includes('yogurt greco')) return item.replace(/yogurt greco/i,'Yogurt di soia');
    if (lower.includes('yogurt')) return item.replace(/yogurt/i,'Yogurt di soia');
    if (lower.includes('skyr')) return item.replace(/skyr/i,'Yogurt di cocco');
    if (lower.includes('kefir')) return item.replace(/kefir/i,'Kefir di cocco');
    if (lower.includes('ricotta vaccina')) return item.replace(/ricotta vaccina/i,'Ricotta di mandorle');
    if (lower.includes('ricotta magra')) return item.replace(/ricotta magra/i,'Tofu morbido');
    if (lower.includes('ricotta')) return item.replace(/ricotta/i,'Ricotta di mandorle');
    if (lower.includes('fiocchi di latte')) return item.replace(/fiocchi di latte/i,'Tofu sbriciolato');
    if (lower.includes('formaggio fresco')) return item.replace(/formaggio fresco/i,'Formaggio vegano');
    if (lower.includes('latte di mandorla') || lower.includes('latte di avena') || lower.includes('latte di soia') || lower.includes('latte di cocco')) return item;
    if (lower.includes('latte parzialmente scremato')) return item.replace(/latte parzialmente scremato/i,'Latte di avena');
    if (lower.includes('latte')) return item.replace(/latte/i,'Latte di avena');
    if (lower.includes('smoothie bowl (banana, avena, latte)')) return "Smoothie bowl (banana, avena, latte di avena)";
    if (lower.includes('miele grezzo')) return item.replace(/miele grezzo/i,"Sciroppo d'agave");
    if (lower.includes('miele')) return item.replace(/miele/i,"Sciroppo d'acero");
  }
  return item;
}

function getDietMeals(diet, month, allergyText) {
  // month: 1–12, default = mese corrente
  const m = (month !== undefined && month !== null) ? month : (new Date().getMonth() + 1);
  const base = WEEKLY_MEALS.omnivore;

  // Applica sostituzione dietetica + stagionale + filtro allergeni su ogni item
  const applyAll  = (it) => applyAllergyFilter(applySeasonalSub(applyDietSub(it, diet), m), allergyText);
  const applySeas = (it) => applyAllergyFilter(applySeasonalSub(it, m), allergyText);

  return base.map(dayMeal => {
    const newDay = {};
    for (const [mealKey, meal] of Object.entries(dayMeal)) {
      if (!meal || typeof meal !== 'object') { newDay[mealKey] = meal; continue; }
      const applyFn = (!diet || diet === 'omnivore') ? applySeas : applyAll;
      newDay[mealKey] = {
        ...meal,
        items: meal.items ? meal.items.map(applyFn) : meal.items,
        alts: meal.alts ? Object.fromEntries(
          Object.entries(meal.alts).map(([k, arr]) =>
            [k, Array.isArray(arr) ? arr.map(applyFn) : arr]
          )
        ) : meal.alts,
      };
    }
    return newDay;
  });
}


function normalizeShoppingName(name) {
  return formatFoodText(name).toLowerCase()
    .replace(/\b(integrali?|bio|fresc[oa]|natural[ei]|magr[oa]|affumicat[oa]|0%|grezzo|secch[oi])\b/g,'')
    .replace(/\d+%/g,'')
    .replace(/\s+/g,' ')
    .trim();
}

function getShoppingCategory(name) {
  const n = formatFoodText(name).toLowerCase();
  if (/\b(pollo|tacchino|salmone|tonno|sgombro|merluzzo|branzino|gamberi?|manzo|bresaola|uov[ao]|albumi|skyr|yogurt|kefir|ricotta|fiocchi di latt|tofu|tempeh|edamame|seitan|proteine|mozzarella|feta|grana)\b/.test(n)) return "Proteine";
  if (/\b(riso|avena|quinoa|farro|pasta|orzo|cous.?cous|pane|patate|zucca|granola|crackers|gallette|muesli|farina|fiocchi|crema di riso|wrap|piadina|ceci|lenticchie|fagioli)\b/.test(n)) return "Cereali & Legumi";
  if (/\b(spinaci|broccoli|zucchine?|peperoni|carote?|pomodorini?|pomodoro|rucola|cetrioli?|finocchi?|asparagi|fagiolini|insalata|funghi|verdure?|mais|minestrone)\b/.test(n)) return "Verdure fresche";
  if (/\b(banana|mele?|mango|frutti rossi|frutti di bosco|kiwi|arancia|pere?|lamponi|mirtilli|fragole|frutta|datteri)\b/.test(n)) return "Frutta";
  if (/\b(olio|mandorle?|noci|semi|sesamo|burro di arachidi|tahina|olive?|cioccolato|cacao|avocado|nocciole?)\b/.test(n)) return "Grassi & Semi";
  return "Condimenti & Altro";
}

function parseShoppingIngredient(item) {
  const display = formatFoodText(item).trim();
  const match = display.match(/^(.+?)\s*-\s*(\d+(?:[,.]\d+)?)\s*(g|kg|ml|l|pz|media|medio|tazzina|cucchiaino)$/i);
  const name = match ? match[1].trim() : display;
  const qty = match ? parseFloat(match[2].replace(',','.')) : 1;
  const rawUnit = match ? match[3].toLowerCase() : 'qb';
  const unit = rawUnit === 'kg' ? 'g' : rawUnit === 'l' ? 'ml' : rawUnit;
  const total = rawUnit === 'kg' || rawUnit === 'l' ? qty * 1000 : qty;
  return { display, name, qty: total, unit, key: `${normalizeShoppingName(name)}|${unit}`, cat: getShoppingCategory(name) };
}

function formatShoppingQuantity(total, unit) {
  if (unit === 'qb') return '';
  if (unit === 'g' && total >= 1000) return ` (${(total / 1000).toFixed(total % 1000 ? 1 : 0)}kg)`;
  if (unit === 'ml' && total >= 1000) return ` (${(total / 1000).toFixed(total % 1000 ? 1 : 0)}l)`;
  if (unit === 'media') return ` (${Math.round(total)} ${Math.round(total) === 1 ? 'media' : 'medie'})`;
  if (unit === 'medio') return ` (${Math.round(total)} ${Math.round(total) === 1 ? 'medio' : 'medi'})`;
  if (unit === 'tazzina') return ` (${Math.round(total)} ${Math.round(total) === 1 ? 'tazzina' : 'tazzine'})`;
  if (unit === 'cucchiaino') return ` (${Math.round(total)} ${Math.round(total) === 1 ? 'cucchiaino' : 'cucchiaini'})`;
  return ` (${Math.round(total)}${unit})`;
}

function splitShoppingDisplay(item) {
  const text = formatFoodText(item);
  const match = text.match(/^(.+?)\s*\(([^)]+)\)$/);
  return match ? { name: match[1].trim(), quantity: match[2].trim() } : { name: text, quantity: "" };
}

function splitIngredientDisplay(item) {
  const text = formatFoodText(item).trim();
  const dashMatch = text.match(/^(.+?)\s*-\s*(\d+(?:[,.]\d+)?\s*(?:g|kg|ml|l|pz|media|medio|tazzina|cucchiaino))$/i);
  if (dashMatch) return { name: dashMatch[1].trim(), quantity: dashMatch[2].trim(), full: text };
  const parenMatch = text.match(/^(.+?)\s*\(([^)]+)\)$/);
  if (parenMatch) return { name: parenMatch[1].trim(), quantity: parenMatch[2].trim(), full: text };
  return { name: text, quantity: "", full: text };
}

function getPersonalizedShopping(userData, plan, appliedSwaps = {}) {
  if (plan?.aiEnginePlan?.mealStructure?.days?.length) {
    const cats = ["Proteine","Cereali & Legumi","Verdure fresche","Frutta","Grassi & Semi","Condimenti & Altro"];
    const result = {};
    cats.forEach(c => { result[c] = []; });

    const totals = {};
    const swaps = appliedSwaps || {};
    const add = (item, fallbackKey) => {
      const display = swaps[fallbackKey] || formatFoodText(item);
      const parsed = parseShoppingIngredient(display);
      if (!parsed.key) return;
      if (!totals[parsed.key]) totals[parsed.key] = { dispName: parsed.name, total: 0, unit: parsed.unit, cat: parsed.cat };
      totals[parsed.key].total += parsed.qty;
    };

    plan.aiEnginePlan.mealStructure.days.forEach((day, dayIndex) => {
      (day.meals || []).forEach((meal) => {
        const slotId = AI_SLOT_IDS[meal.slot] || meal.slot || 'meal';
        (meal.ingredients || []).forEach((item, itemIndex) => add(item, `${dayIndex}-${slotId}-${itemIndex}`));
      });
    });

    Object.values(totals).forEach(({dispName, total, unit, cat}) => {
      result[cat].push(`${dispName}${formatShoppingQuantity(total, unit)}`);
    });

    cats.forEach(c => { if (!result[c]?.length) delete result[c]; });
    return result;
  }

  const diet  = (userData?.diet || "omnivore").toLowerCase();
  const allrg = (userData?.allergies || "").toLowerCase();
  const isVegan  = diet.includes("vegan");
  const isVeget  = isVegan || diet.includes("vegetar");
  const noFish   = allrg.includes("pesce") || allrg.includes("crostac");
  const noEgg    = allrg.includes("uov") || isVegan;
  const noMilk   = allrg.includes("latt") || allrg.includes("lattosio") || isVegan;
  const noNuts   = allrg.includes("frutta secca") || allrg.includes("noci") || allrg.includes("mandorl");
  const noPeanut = allrg.includes("arachid") || noNuts;
  const s = Math.min(2, Math.max(0.6, (plan?.calories || 2000) / 2000));

  // ── Estrai ingredienti direttamente da WEEKLY_MEALS ──
  const weekMeals = getDietMeals(diet, null, userData?.allergies);

  // Parse item string → array di {name, qty, unit}
  const _parse = (str) => {
    const out = [];
    // Match: "Name (qty unit [extra text])" — più occorrenze per stringa
    const re = /([A-Za-zÀ-ÿ'\s%&°\/]+?)\s*\(\s*(?:[¼½¾]\s*(?:,\s*)?)?(\d+(?:[,.]\d+)?)\s*(g|kg|ml|l|cl|pz)?\b[^)]*\)/gi;
    let m;
    while ((m = re.exec(str)) !== null) {
      let raw = m[1].trim();
      const qty  = parseFloat((m[2]||'1').replace(',','.')) || 1;
      const unit = (m[3]||'pz').toLowerCase();
      // Rimuovi descrittori di cottura/preparazione
      raw = raw
        .replace(/\b(alla|al|allo|agli|alle)\s+(griglia|piastra|forno|vapore|cartoccio|curry|limone|rosmarino|timo|arrosto|padella|wok)\b/gi,'')
        .replace(/\b(strapazzat[aeiou]|in camicia|poché|bolliti?|caldi?|arrosto|crudi?|affumicat[oa]|magr[oa]|parz\.?\s*scremati?|scremati?|integrali?|fresc[oa]|secch[oi]|bio|naturali?|light)\b/gi,'')
        .replace(/\s*\d+%\s*/g,'')
        .replace(/\s+/g,' ')
        .replace(/\s*(e|con|di|al|alla|a|in|per)$/i,'').trim();
      raw = raw.replace(/^(e|con|di|al|alla|a|in|per)\s+/i,'').trim();
      if (!raw || raw.length < 2) continue;
      raw = raw.charAt(0).toUpperCase() + raw.slice(1);
      out.push({name: raw, qty, unit});
    }
    // Item senza parentesi = condimento q.b.
    if (out.length === 0 && str && !str.includes('(')) {
      const clean = str.trim().replace(/^[-•·]\s*/,'');
      if (clean.length > 1) out.push({name: clean, qty: 1, unit: 'qb'});
    }
    return out;
  };

  // Normalizza per deduplicazione
  const _key = (name) => name.toLowerCase()
    .replace(/\b(integrali?|bio|fresc[oa]|natural[ei]|magr[oa]|affumicat[oa]|0%|grezzo|secch[oi])\b/g,'')
    .replace(/\d+%/g,'').replace(/\s+/g,' ').trim();

  // Categoria per ingrediente
  const _cat = (name) => {
    const n = name.toLowerCase();
    if (/\b(pollo|tacchino|salmone|tonno|sgombro|merluzzo|orata|branzino|spigola|gamberi?|crostac|manzo|tagliata|bistecca|bresaola|carne|maiale|prosciutto|uov[ao]|albumi|skyr|yogurt|kefir|ricotta|fiocchi di latt|cottage|tofu|tempeh|edamame|seitan|mozzarella|parmigian|pecorino|grana|formaggio|latte(?! di [a-z])|whey)\b/.test(n)) return "Proteine";
    if (/\b(riso|avena|quinoa|farro|pasta|orzo|cous.?cous|pane|lenticchi|ceci|fagioli|legumi|granola|crackers|gallette|muesli|bulgur|miglio|soba|polenta|farina|fiocchi|grano saraceno|amaranto|kamut|english muffin|pancake|waffle|french toast)\b/.test(n)) return "Cereali & Legumi";
    if (/\b(spinaci|broccoli|zucchine?|peperoni|carote?|pomodorini?|pomodori?|rucola|cetrioli?|finocchi?|patate?|asparagi|fagiolini|melanzane?|insalata|funghi|bieta|cavolo|cavolfiore|cavoletti|songino|radicchio|verdure?|piselli|sedano|porro|cipolla|aglio|barbabietola|carciofi|indivia|lattuga|misticanza|wakame|cavolo kale|pak choi)\b/.test(n)) return "Verdure fresche";
    if (/\b(banana|banane|mele?|mango|frutti di bosco|avocado|kiwi|arancia|arance|pere?|ananas|limone|limoni|dattero|datteri|fichi|cocco(?! rapé)|lamponi|mirtilli|fragole|albicocche|uva|pesche?|melone|mandarini|frutto di stagione)\b/.test(n)) return "Frutta";
    if (/\b(olio|mandorle?|noci|noce|pistacchi|anacardi|pinoli|semi(?! di soia)|sesamo|burro di arachidi|burro di mandorle|tahini|olive?|cioccolato|cacao|cocco rapé|nocciole?)\b/.test(n)) return "Grassi & Semi";
    return "Condimenti & Altro";
  };

  // Accumula quantità
  const totals = {};
  const toBase = (qty, unit) => unit==='kg'?qty*1000:unit==='l'?qty*1000:qty;
  const addIng = (name, qty, unit) => {
    const k = _key(name);
    if (!k || k.length < 2) return;
    if (!totals[k]) totals[k] = {dispName: name, total: 0, unit, cat: _cat(name)};
    totals[k].total += toBase(qty, unit);
  };

  weekMeals.forEach((day, di) => {
    // Alterna colazione per non sovrastimare entrambe le versioni
    const bfKey = di % 2 === 0 ? 'colazione_dolce' : 'colazione_salata';
    ['pranzo','cena','snack','snack_m','snack_n', bfKey].forEach(mk => {
      const meal = day[mk];
      if (!meal?.items) return;
      meal.items.forEach(item => {
        _parse(item).forEach(({name, qty, unit}) => {
          const n = name.toLowerCase();
          if (noFish && /salmone|tonno|sgombro|merluzzo|orata|branzino|spigola|gamberi?|crostac/i.test(n)) return;
          if (noEgg  && /uov[ao]|albumi/i.test(n)) return;
          if (noMilk && /\b(yogurt|ricotta|mozzarella|parmigian|formaggio|skyr|kefir|latte(?! di [a-z]))\b/i.test(n)) return;
          if (noNuts && /\b(mandorl|noci|noce|pistacchi|anacardi|pinoli|nocciole?)\b/i.test(n)) return;
          if (noPeanut && /arachid|burro di arachidi/i.test(n)) return;
          addIng(name, qty, unit);
        });
      });
    });
  });

  // Formatta con scala
  const _fmt = (total, unit) => {
    if (unit === 'qb') return null;
    if (unit === 'pz') return `${Math.max(1, Math.round(total * s))}pz`;
    const v = Math.max(50, Math.round(total * s / 50) * 50);
    if ((unit==='g'||unit==='kg') && v>=1000) { const k=v/1000; return `${k%1===0?k:k.toFixed(1)}kg`; }
    if ((unit==='ml'||unit==='l') && v>=1000) { const l=v/1000; return `${l%1===0?l:l.toFixed(1)}l`; }
    return `${v}${unit}`;
  };

  const cats = ["Proteine","Cereali & Legumi","Verdure fresche","Frutta","Grassi & Semi","Condimenti & Altro"];
  const result = {};
  cats.forEach(c => { result[c] = []; });

  Object.values(totals).forEach(({dispName, total, unit, cat}) => {
    const fmtQty = _fmt(total, unit);
    result[cat].push(fmtQty ? `${dispName} (${fmtQty})` : dispName);
  });

  cats.forEach(c => { if (!result[c]?.length) delete result[c]; });
  return result;
}

// Unisce due liste personalizzate sommando le quantità degli articoli in comune
function shoppingItemBase(item) {
  const text = formatFoodText(item)
    .replace(/\([^)]*\)/g, '')
    .replace(/\s*-\s*\d+(?:[,.]\d+)?\s*(g|kg|ml|l|pz|media|medio|tazzina|cucchiaino)\b/i, '')
    .trim();
  return normalizeShoppingName(text);
}

function estimateIngredientMacros(item) {
  const text = formatFoodText(item);
  const lower = text.toLowerCase();
  const match = text.match(/-\s*(\d+(?:[,.]\d+)?)\s*(g|kg|ml|l|pz|media|medio)/i);
  let qty = match ? parseFloat(match[1].replace(',','.')) : 100;
  const unit = match ? match[2].toLowerCase() : 'g';
  if (unit === 'kg' || unit === 'l') qty *= 1000;
  if (unit === 'pz' || unit === 'media' || unit === 'medio') qty *= 100;

  const table = [
    [/pollo|tacchino|tonno|merluzzo|branzino|nasello|gamberi|bresaola/, {cal:120,p:24,c:0,f:2}],
    [/salmone|sgombro|trota/, {cal:200,p:22,c:0,f:12}],
    [/uova/, {cal:140,p:12,c:1,f:10}],
    [/tofu|tempeh|seitan|edamame/, {cal:145,p:16,c:8,f:6}],
    [/yogurt greco|skyr|ricotta|fiocchi di latte|kefir/, {cal:85,p:11,c:5,f:2}],
    [/proteine/, {cal:380,p:75,c:8,f:5}],
    [/riso|pasta|quinoa|cous cous|orzo|farro|avena|granola|pane|wrap|piadina|gallette|crackers|crema di riso/, {cal:350,p:10,c:70,f:3}],
    [/patate|zucca/, {cal:85,p:2,c:19,f:0}],
    [/ceci|lenticchie|fagioli|legumi|hummus/, {cal:145,p:8,c:20,f:3}],
    [/olio evo|olio/, {cal:900,p:0,c:0,f:100}],
    [/avocado|noci|mandorle|semi|tahina|burro di arachidi|olive/, {cal:580,p:15,c:15,f:50}],
    [/banana|mela|pera|kiwi|fragole|mirtilli|frutti|lamponi|mango|arancia|datteri/, {cal:70,p:1,c:16,f:0}],
    [/zucchine|broccoli|spinaci|carote|verdure|insalata|pomodoro|cetrioli|peperoni|funghi|asparagi|finocchi|fagiolini|mais/, {cal:35,p:2,c:6,f:0}]
  ];
  const found = table.find(([rx]) => rx.test(lower));
  if (!found) return {cal:0,p:0,c:0,f:0};
  const per100 = found[1];
  const factor = Math.max(0, qty) / 100;
  return {
    cal: Math.round(per100.cal * factor),
    p: Math.round(per100.p * factor),
    c: Math.round(per100.c * factor),
    f: Math.round(per100.f * factor)
  };
}

function getAdjustedMealMacros(dayIndex, mealKey, meal, swaps) {
  const base = meal?.macros || {cal:0,p:0,c:0,f:0};
  return (meal?.items || []).reduce((acc, item, itemIndex) => {
    const key = `${dayIndex}-${mealKey}-${itemIndex}`;
    if (!swaps?.[key]) return acc;
    const oldMx = estimateIngredientMacros(item);
    const newMx = estimateIngredientMacros(swaps[key]);
    return {
      cal: Math.max(0, acc.cal - oldMx.cal + newMx.cal),
      p: Math.max(0, acc.p - oldMx.p + newMx.p),
      c: Math.max(0, acc.c - oldMx.c + newMx.c),
      f: Math.max(0, acc.f - oldMx.f + newMx.f)
    };
  }, {...base});
}

function ownedShoppingKey(userData) {
  return `dubi_shopping_owned_${userData?.dubiCode || localStorage.getItem("dubi_email") || "guest"}`;
}

function rememberOwnedShoppingIngredient(userData, item) {
  try {
    const key = ownedShoppingKey(userData);
    const existing = JSON.parse(localStorage.getItem(key) || "[]");
    const base = shoppingItemBase(item);
    if (base && !existing.includes(base)) localStorage.setItem(key, JSON.stringify([...existing, base]));
  } catch(e) {}
}

function flattenShoppingItems(userData, plan, swaps) {
  const shop = getPersonalizedShopping(userData, plan, swaps);
  return Object.values(shop).flat();
}

function findShoppingCoverage(userData, plan, swaps, ingredient) {
  const base = shoppingItemBase(ingredient);
  if (!base) return { exists: false, checked: false, item: null };
  const items = flattenShoppingItems(userData, plan, swaps);
  const item = items.find(entry => {
    const entryBase = shoppingItemBase(entry);
    return entryBase === base || entryBase.includes(base) || base.includes(entryBase);
  });
  if (!item) return { exists: false, checked: false, item: null };

  try {
    const checked = JSON.parse(localStorage.getItem(shoppingStorageKey(userData)) || "{}");
    return { exists: true, checked: Boolean(checked[item]), item };
  } catch(e) {
    return { exists: true, checked: false, item };
  }
}

function mergeShoppingLists(shop1, shop2, name1, name2) {
  const parseItem = str => {
    const m = str.match(/^(.+?)\s*\((\d+(?:\.\d+)?)\s*(g|kg|ml|l|pz)\)$/i);
    return m ? {base:m[1].trim(), num:parseFloat(m[2]), unit:m[3].toLowerCase()} : {base:str, num:null, unit:null};
  };
  const toGrams = (n,u) => u==='kg'?n*1000:u==='l'?n*1000:n;
  const fromGrams = (n,u) => {
    if((u==='g'||u==='kg')&&n>=1000){const k=n/1000;return`${k%1===0?k:k.toFixed(1)}kg`;}
    if((u==='ml'||u==='l')&&n>=1000){const l=n/1000;return`${l%1===0?l:l.toFixed(1)}l`;}
    return `${Math.round(n)}${u==='kg'?'g':u==='l'?'ml':u}`;
  };

  const allCats = [...new Set([...Object.keys(shop1),...Object.keys(shop2)])];
  const merged = {};
  allCats.forEach(cat => {
    const list1 = (shop1[cat]||[]).map(s=>({...parseItem(s),orig:s,owner:1}));
    const list2 = (shop2[cat]||[]).map(s=>({...parseItem(s),orig:s,owner:2}));
    const result = [];
    const used2 = new Set();
    list1.forEach(a => {
      const bKey = a.base.toLowerCase();
      const b = list2.find(x=>x.base.toLowerCase()===bKey);
      if (b) {
        used2.add(b.orig);
        if (a.num && b.num && a.unit && b.unit) {
          const normU = a.unit==='kg'?'g':a.unit==='l'?'ml':a.unit;
          const total = toGrams(a.num,a.unit) + toGrams(b.num,b.unit);
          result.push({item:`${a.base} (${fromGrams(total,normU)})`, tag:null});
        } else {
          result.push({item:a.orig, tag:null});
        }
      } else {
        result.push({item:a.orig, tag:name1});
      }
    });
    list2.filter(b=>!used2.has(b.orig)).forEach(b=>{
      result.push({item:b.orig, tag:name2});
    });
    merged[cat] = result;
  });
  return merged;
}

  const [error, setError] = React.useState(false);
  const inputRef = React.useRef(null);

  // Sync raw quando il valore esterno cambia (es. dai pulsanti +/-)
  React.useEffect(()=>{
    if (!focused) setRaw(String(value));
  },[value, focused]);

  const commit = (raw) => {
    const v = parseInt(raw, 10);
    if (!isNaN(v) && v >= min && v <= max) {
      setError(false);
      onChange(v);
      setRaw(String(v));
    } else {
      setError(true);
      // ripristina dopo breve tempo
      setTimeout(()=>{ setError(false); setRaw(String(value)); }, 1200);
    }
  };

  const handleFocus = () => { setFocused(true); inputRef.current?.select(); };
  const handleBlur  = () => { setFocused(false); commit(raw); };
  const handleKey   = (e) => { if (e.key==="Enter") { e.preventDefault(); commit(raw); inputRef.current?.blur(); } };

  const inc = () => { const v = Math.min(max, value+1); onChange(v); setRaw(String(v)); };
  const dec = () => { const v = Math.max(min, value-1); onChange(v); setRaw(String(v)); };

  const borderColor = error ? "#C47B7B" : focused ? T.accent : T.border;

  return (
    <div style={{marginBottom:18}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
        <p style={{fontSize:12,color:T.muted,letterSpacing:0.5,margin:0}}>{label}</p>
        {error && <span style={{fontSize:11,color:"#C47B7B"}}>Valore non valido ({min}–{max})</span>}
      </div>
      <div style={{display:"flex",alignItems:"center",background:T.card,
        border:`1.5px solid ${borderColor}`,borderRadius:14,
        transition:"border-color 0.2s",overflow:"hidden"}}>

        {/* Pulsante − */}
        <button onClick={dec}
          style={{padding:"14px 18px",background:"none",border:"none",
            fontSize:24,color:T.text,cursor:"pointer",flexShrink:0,lineHeight:1,
            borderRight:`1px solid ${T.border}`,userSelect:"none"}}>−</button>

        {/* Input centrale — digitabile direttamente */}
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",
          padding:"0 8px",position:"relative",cursor:"text"}}
          onClick={()=>inputRef.current?.focus()}>
          <input
            ref={inputRef}
            type="number"
            inputMode="numeric"
            value={raw}
            onFocus={handleFocus}
            onBlur={handleBlur}
            onKeyDown={handleKey}
            onChange={e=>setRaw(e.target.value)}
            style={{
              width:"100%",textAlign:"center",fontSize:26,fontWeight:700,
              color: error ? "#C47B7B" : T.text,
              background:"none",border:"none",outline:"none",fontFamily:"inherit",
              MozAppearance:"textfield",WebkitAppearance:"none",appearance:"textfield",
              padding:"12px 0",letterSpacing:-0.5,
            }}
          />
          <span style={{fontSize:13,fontWeight:400,color:T.muted,
            position:"absolute",right:10,pointerEvents:"none",bottom:16}}>{unit}</span>
        </div>

        {/* Pulsante + */}
        <button onClick={inc}
          style={{padding:"14px 18px",background:"none",border:"none",
            fontSize:24,color:T.text,cursor:"pointer",flexShrink:0,lineHeight:1,
            borderLeft:`1px solid ${T.border}`,userSelect:"none"}}>+</button>
      </div>
    </div>
  );
};

const OptBtn = ({options,value,onChange,small}) => (
  <div style={{display:"flex",flexDirection:"column",gap:small?6:8}}>
    {options.map(o => (
      <button key={o.id} onClick={()=>onChange(o.id)}

// LINE CHART (SVG)
// ═══════════════════════════════════════════════
const LineChart = ({data, color=T.accent, height=120, label="", unit=""}) => {
  if (!data || data.length < 2) return null;
  const W=300, H=height, pad=20;
  const vals = data.map(d=>d.value);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max-min || 1;
  const pts = data.map((d,i)=>{
    const x = pad + (i/(data.length-1))*(W-2*pad);
    const y = pad + (1-(d.value-min)/range)*(H-2*pad);
    return [x,y];
  });
  const path = pts.map((p,i)=>(i===0?"M":"L")+p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  const area = path + ` L${pts[pts.length-1][0].toFixed(1)},${H-pad} L${pts[0][0].toFixed(1)},${H-pad} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,overflow:"visible"}}>
      <defs>
        <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#grad)"/>
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
      {pts.map((p,i)=>(
        <g key={i}>
          <circle cx={p[0]} cy={p[1]} r="4" fill={color}/>
          <text x={p[0]} y={H-4} textAnchor="middle" fontSize="9" fill={T.muted}>{data[i].label}</text>
          {i===pts.length-1 && <text x={p[0]+6} y={p[1]-6} fontSize="10" fill={color} fontWeight="600">{data[i].value}{unit}</text>}
        </g>
      ))}
    </svg>
  );
};
