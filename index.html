// ── PLAN CHANGE DETECTION ──
// Ritorna un oggetto planChange se il messaggio implica una modifica al piano di oggi.
// action: "skip_meal" | "shift_times" | "light_day"
function detectPlanChange(t, plan) {
  const slots = plan?.mealCount || 4;

  // Sveglio tardi → salta colazione, aggiunge spuntino extra metà mattina
  if (/(svegliato|alzato|dormito).*(tardi|mezzogiorno|pranzo|ora di pranzo|a pranzo)|mi.*sveglio.*tard|noon|wake.*up.*late/i.test(t) ||
      /(colazione.*salto|salto.*colazione|non.*colazione.*stamatt|non riesco.*colazione|impossibile.*colazione)/i.test(t)) {
    return {
      action: "skip_meal",
      mealId: "colazione",
      banner: "Colazione rimossa · aggiunto Spuntino Extra per recuperare i nutrienti",
      planNote: "Ho rimosso la colazione e aggiunto uno Spuntino Extra mattutino con gli stessi nutrienti, così raggiungi comunque tutti i tuoi obiettivi giornalieri.",
      confirmLabel: "Sì, aggiorna il piano",
      extraMeal: {
        id: "extra_colazione",
        label: "Spuntino Extra · DUBI",
        icon: "star",
        time: "10:30",
        isExtra: true,
        data: {
          name: "Spuntino bilanciato compensativo",
          items: ["Yogurt greco 200g", "Avena 60g", "Banana matura", "Mandorle 20g", "Miele grezzo 10g"],
          macros: { cal: 440, p: 24, c: 62, f: 13 },
          why: "Aggiunto da DUBI per compensare la colazione saltata. Yogurt greco e avena forniscono proteine complete e carboidrati a lento rilascio. La banana supporta l'energia mentale, le mandorle i grassi buoni. Consumalo entro le 11:00 per mantenere il ritmo metabolico della giornata."
        }
      }
    };
  }

  // Non riesce a fare pranzo → aggiunge spuntino pomeridiano extra
  if (/(non riesco.*pranzo|salto.*pranzo|pranzo.*salto|senza pranzo|non posso.*pranzo|impossibile.*pranzo)/i.test(t)) {
    return {
      action: "skip_meal",
      mealId: "pranzo",
      banner: "Pranzo rimosso · aggiunto Pasto Extra pomeridiano",
      planNote: "Ho rimosso il pranzo e aggiunto un pasto proteico nel pomeriggio per garantire che tu raggiunga comunque proteine, carboidrati e calorie target.",
      confirmLabel: "Sì, aggiorna il piano",
      extraMeal: {
        id: "extra_pranzo",
        label: "Pasto Extra · DUBI",
        icon: "star",
        time: "15:30",
        isExtra: true,
        data: {
          name: "Pasto proteico pomeridiano",
          items: ["Pollo o tonno 150g", "Riso integrale 80g", "Verdure miste 200g", "Olio EVO 10g", "Limone"],
          macros: { cal: 520, p: 42, c: 58, f: 12 },
          why: "Aggiunto da DUBI per compensare il pranzo saltato. Proteina magra + carboidrati complessi nel pomeriggio supportano il recupero muscolare e mantengono stabile la glicemia fino a cena."
        }
      }
    };
  }

  // Non riesce a fare cena → aggiunge snack serale proteico
  if (/(non riesco.*cena|salto.*cena|cena.*salto|senza cena|non posso.*cena|sento.*poco.*fame.*sera)/i.test(t)) {
    return {
      action: "skip_meal",
      mealId: "cena",
      banner: "Cena rimossa · aggiunto Snack Serale proteico",
      planNote: "Ho rimosso la cena e aggiunto uno snack proteico serale leggero per proteggere la massa muscolare durante il digiuno notturno.",
      confirmLabel: "Sì, aggiorna il piano",
      extraMeal: {
        id: "extra_cena",
        label: "Snack Serale · DUBI",
        icon: "moon",
        time: "21:00",
        isExtra: true,
        data: {
          name: "Snack proteico notturno",
          items: ["Skyr o ricotta 150g", "Frutta secca mista 20g", "Cioccolato fondente 10g"],
          macros: { cal: 280, p: 22, c: 18, f: 11 },
          why: "Aggiunto da DUBI come alternativa leggera alla cena. La caseina di skyr/ricotta è a digestione lenta: protegge la massa muscolare durante le ore di sonno senza appesantire la digestione notturna."
        }
      }
    };
  }

  // Fuori casa / ristorante a pranzo
  if (/(fuori casa|ristorante|lavoro|mensa|bar).*(pranzo|colazione)/i.test(t) ||
      /(pranzo|colazione).*(fuori|ristorante|non cucino)/i.test(t)) {
    return {
      action: "restaurant_note",
      mealId: "pranzo",
      banner: "Pranzo fuori casa · guida ordine smart attiva",
      planNote: "Pranzo fuori? Ordina: proteina magra (pollo/pesce) + verdure + carboidrato semplice. Evita fritti e salse pesanti. Le calorie sono invariate.",
      confirmLabel: "Ok, ho capito",
    };
  }

  // Fuori casa / ristorante a cena
  if (/(fuori casa|ristorante|aperitivo|evento|festa).*(cena|stasera|sera)/i.test(t) ||
      /(cena|stasera).*(fuori|ristorante|non cucino|non sono)/i.test(t)) {
    return {
      action: "restaurant_note",
      mealId: "cena",
      banner: "Cena fuori casa · piano adattato per la sera",
      planNote: "Cena al ristorante: priorità proteina (almeno 30g), verdure abbondanti, carboidrati moderati. Un bicchiere di vino è ok. L'importante è il totale di giornata.",
      confirmLabel: "Ok, ho capito",
    };
  }

  // Giornata pesante / stressante → pasto leggero
  if (/(stomaco.*chiuso|non ho fame|poco appetito|giornata pesante|stomaco in.*sens|nausea|stress)/i.test(t)) {
    return {
      action: "light_day",
      banner: "Giornata difficile · piano alleggerito attivato",
      planNote: "Nessun problema. Nelle giornate difficili privilegia cibi facili: riso bianco, pollo bollito, brodo, frutta matura. Non forzare le porzioni.",
      confirmLabel: "Ok, aiutami",
    };
  }

  // ── Orario allenamento specificato → ricalcola orari pasti ─────────────────
  // Rileva frasi tipo "mi alleno alle 6", "training at 7am", "vado in palestra alle 18"
  const timeRgx = /(?:alleno|mi alleno|mi allena|workout|training|palestra|gym|allenamento|train|vado in palestra)\s*(?:alle?|at|@|verso)?\s*(\d{1,2})(?:[:\.](\d{2}))?\s*(mattina|pomeriggio|sera|notte|am|pm|di mattina|al pomeriggio|in palestra)?/i;
  const timeRgx2 = /(?:alle?|at|@)\s*(\d{1,2})(?:[:\.](\d{2}))?\s*(mattina|pomeriggio|sera|am|pm|di mattina)?\s*(?:mi alleno|alleno|workout|training|palestra|gym|allenamento)/i;
  const tm = t.match(timeRgx) || t.match(timeRgx2);
  if (tm) {
    let hour = parseInt(tm[1]);
    const min  = tm[2] ? parseInt(tm[2]) : 0;
    const period = (tm[3] || "").toLowerCase();
    if ((period.includes("pomeriggio") || period.includes("pm") || period.includes("afternoon")) && hour < 12) hour += 12;
    if ((period.includes("sera") || period.includes("evening") || period.includes("notte")) && hour < 12) hour += 12;
    if (hour >= 24) hour = 23;

    const trainingH = hour + min / 60;
    const mealCount = plan?.mealCount || 4;
    const fmt = h => {
      const hh = Math.max(5, Math.min(23, Math.floor(h)));
      const mm = Math.round((h - Math.floor(h)) * 60);
      return `${String(hh).padStart(2,"0")}:${String(mm < 60 ? mm : 0).padStart(2,"0")}`;
    };

    // Costruisce orari intelligenti centrati sull'allenamento
    let customTimes;
    if (trainingH <= 8) {
      // Mattina presto (5-8): pre-WO prima, colazione/post-WO dopo
      customTimes = mealCount <= 3
        ? [fmt(trainingH + 1.5), fmt(13), fmt(20)]
        : mealCount === 4
          ? [fmt(trainingH - 0.5), fmt(trainingH + 1.5), fmt(16.5), fmt(20)]
          : [fmt(trainingH - 0.5), fmt(trainingH + 1.5), fmt(13), fmt(16.5), fmt(20)];
    } else if (trainingH <= 12) {
      // Tardo mattino (9-12): colazione normale, pre-WO snack, post-WO a pranzo
      customTimes = mealCount <= 3
        ? [fmt(7), fmt(trainingH + 1.5), fmt(20)]
        : mealCount === 4
          ? [fmt(7), fmt(trainingH - 1), fmt(trainingH + 1.5), fmt(20)]
          : [fmt(7), fmt(trainingH - 1), fmt(trainingH + 1.5), fmt(16.5), fmt(20)];
    } else if (trainingH <= 17) {
      // Pomeriggio (13-17): colazione, pranzo, pre-WO snack, cena post-WO
      customTimes = mealCount <= 3
        ? [fmt(7.5), fmt(13), fmt(trainingH + 1.5)]
        : mealCount === 4
          ? [fmt(7.5), fmt(13), fmt(trainingH - 1), fmt(trainingH + 1.5)]
          : [fmt(7.5), fmt(10.5), fmt(13), fmt(trainingH - 1), fmt(trainingH + 1.5)];
    } else {
      // Sera (18+): tutti i pasti prima, cena post-WO
      customTimes = mealCount <= 3
        ? [fmt(7.5), fmt(13), fmt(trainingH + 1)]
        : mealCount === 4
          ? [fmt(7.5), fmt(12.5), fmt(trainingH - 1), fmt(trainingH + 1)]
          : [fmt(7.5), fmt(10.5), fmt(13), fmt(trainingH - 1), fmt(trainingH + 1)];
    }

    const hourStr = `${String(hour).padStart(2,"0")}:${String(min).padStart(2,"0")}`;
    return {
      action: "shift_times",
      trainingHour: hour,
      trainingMin: min,
      customTimes,
      banner: `Piano orari aggiornato · allenamento alle ${hourStr}`,
      planNote: `Ho riorganizzato gli orari dei tuoi pasti attorno all'allenamento delle ${hourStr}. Il pre-workout è posizionato 30–60 min prima, la colazione principale subito dopo il training per massimizzare il recupero muscolare (finestra anabolica, ISSN 2017).`,
      confirmLabel: `Sì, aggiorna gli orari per le ${hourStr}`,
    };
  }

  return null;
}

            why: "Aggiunto da DUBI per combattere il calo di energia pomeridiano. La banana fornisce glucosio + potassio per la funzione muscolare. Le noci aggiungono acidi grassi omega-3 per la concentrazione. Fonte: Walker, Sleep & Human Health 2017."
          }
        }
      },
      offerAdd: true,
    };
  }

  // ── INFORMATIVA: peso / plateau ──
  if (/(peso|bilancia|stallo|plateau|non perdo|fermo|risultat|dimagri.*lento|weight.*stuck|scale|plateau|no progress|slow.*loss)/.test(t)) {
    if (isEN) return enResponses.plateau;
    return { title:"Plateau e adattamento metabolico", body:["Il plateau è fisiologico: il corpo si adatta e riduce il TDEE del 10-15% dopo 4-8 settimane di deficit.","Strategia: refeed day (1 giorno a TDEE ogni 2 settimane) per resettare leptina e ormoni tiroidei.","Misura i progressi con foto + misure corporee, non solo bilancia: il peso oscilla di 1-3kg per acqua, glicogeno, ciclo."], source:"Hall et al., Cell Metabolism 2019" };
  }

  // ── INFORMATIVA: proteine ──
  if (/(proteine|protein|whey|caseina|aminoacid|leucina|bcaa|amino acid|leucine)/.test(t)) {
    const p_lo = Math.round(w*1.6), p_hi = Math.round(w*2.2);
    if (isEN) return enResponses.protein(w, p_lo, p_hi);
    return {
      title: "Proteine: dose, timing, fonti",
      body: [
        `Target per ${w}kg: ${p_lo}-${p_hi}g/giorno (1.6-2.2g/kg). Ottimale in 4-5 pasti da 25-40g ciascuno.`,
        "Leucina è il trigger principale per mTOR (sintesi proteica): minimo 2.5g per pasto (∼25g di proteina da pollo/uova).",
        "Whey post-workout per rapidità, caseina prima di dormire per anti-catabolismo notturno.",
      ],
      source: "ISSN Protein Position Stand 2017",
      addableItem: {
        label: "Snack Proteico Post-Workout",
        description: "Yogurt greco + banana: whey naturale + carboidrati per massimizzare la finestra anabolica post-allenamento (entro 2h).",
        extraMeal: {
          id: "extra_proteico_postwork",
          label: "Snack Proteico · DUBI",
          icon: "zap",
          time: "17:00",
          isExtra: true,
          data: {
            name: "Snack proteico post-workout",
            items: ["Yogurt greco 200g", "Banana", "Mandorle 15g"],
            macros: { cal: 280, p: 26, c: 32, f: 8 },
            why: "Aggiunto da DUBI per massimizzare la sintesi proteica post-allenamento. Yogurt greco fornisce leucina (trigger mTOR) + la banana ripristina il glicogeno muscolare. Finestra ottimale: entro 2h dall'allenamento. Fonte: ISSN 2017."
          }
        }
      },
      offerAdd: true,
    };
  }

  // ── INFORMATIVA: salto pasto generico ──
  if (/(salto|salta|skip|saltare|ho saltato|perso un pasto|skipped|missed.*meal)/.test(t)) {
    if (isEN) return enResponses.mealSkip;
    return { title:"Pasto saltato: nessun dramma", body:["Un pasto saltato non compromette nulla. Il metabolismo non si abbassa dopo un singolo pasto.","Non compensare con porzioni doppie: sovraccarichi la digestione e crei un picco insulinico.","Al pasto successivo aggiungi +15-20g di proteine e una porzione normale di carboidrati. Il piano rimane bilanciato."], source:"ISSN Meal Frequency Review 2017" };
  }

  // ── FALLBACK: risposta consulenziale generica ──
  if (isEN) return enResponses.fallback(n);
  return {
    title: `Ho capito${n ? "," + n : ""}`,
    body: [
      "Questa è una buona domanda — fammi essere preciso.",
      "DUBI combina Mifflin-St Jeor, linee guida WHO/EFSA/ISSN e i tuoi dati per darti risposte personalizzate.",
      "Puoi descrivere meglio la situazione? (es: momento della giornata, cosa stai sentendo, che pasto è coinvolto) Così posso aiutarti concretamente.",
    ],
    source: "DUBI — Metodo scientifico",
  };
}

// ── ASK DUBI MODAL — conversazione multi-turno ──
const AskDubiModal = ({onClose, userData, plan, onPlanChange}) => {
  const { t, lang } = useT();
  const [messages, setMessages] = useState([]); // [{id,role:"user"|"dubi",text?,ans?,applied}]
  const [q, setQ] = useState("");
  const scrollRef = React.useRef(null);

  // auto-scroll in fondo ogni volta che arrivano nuovi messaggi
  React.useEffect(()=>{
    if(scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  },[messages]);

  const lastDubiAns = [...messages].reverse().find(m=>m.role==="dubi")?.ans || null;

  const sendMessage = (text) => {
    if (!text.trim()) return;
    const uid = Date.now();
    // aggiungi messaggio utente
    setMessages(ms => [...ms, {id:uid, role:"user", text}]);
    setQ("");
    // calcola risposta DUBI passando il contesto dell'ultimo messaggio DUBI
    const context = lastDubiAns;
    const a = answerAskDubi(text, userData, plan, context, lang);
    // aggiungi risposta DUBI dopo breve delay (effetto "sta scrivendo")
    setTimeout(()=>{
      setMessages(ms => [...ms, {id:uid+1, role:"dubi", ans:a, applied:false}]);
    }, 400);
  };

  const applyChange = (msgId, planChange) => {
    if (planChange && onPlanChange) {
      onPlanChange(planChange);
      setMessages(ms => ms.map(m => m.id===msgId ? {...m, applied:true} : m));
    }
  };

  const hasMessages = messages.length > 0;

  return (
    <div style={{position:"fixed",inset:0,zIndex:260,display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick={onClose}>
      <div style={{background:"rgba(0,0,0,0.45)",position:"absolute",inset:0}} />
      <div style={{position:"relative",background:T.bg,borderRadius:"24px 24px 0 0",maxHeight:"92vh",display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
        <div style={{width:40,height:4,borderRadius:2,background:T.border,margin:"16px auto 0",flexShrink:0}} />

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 20px 12px",flexShrink:0,borderBottom:`1px solid ${T.border}`}}>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <div style={{width:38,height:38,borderRadius:12,background:T.accentD+"18",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <Ico n="leaf2" size={18} c={T.accentD}/>
            </div>
            <div>
              <h2 style={{fontFamily:"'Manrope','Inter',sans-serif",fontSize:17,fontWeight:700,color:T.text,margin:0}}>{t("today.askDubi")}</h2>
              <p style={{fontSize:10,color:T.muted,margin:"1px 0 0"}}>{t("askdubi.support")}</p>
            </div>
          </div>
          <button onClick={onClose} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:50,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
            <Ico n="x" size={15} c={T.muted}/>
          </button>
        </div>

        {/* Chat area */}
        <div ref={scrollRef} style={{flex:1,overflowY:"auto",padding:"16px 20px",minHeight:0}}>

          {/* Stato iniziale: suggestions */}
          {!hasMessages && (
            <>
              <p style={{fontSize:11,color:T.muted,letterSpacing:1,marginBottom:10}}>{t("askdubi.suggestions.label")}</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
                {ASK_DUBI_SUGGESTION_KEYS.map((sk,i)=>{
                  const s=t(sk); return (
                  <button key={i} onClick={()=>sendMessage(s)}
                    style={{padding:"9px 13px",fontSize:12,color:T.text,background:T.card,
                      border:`1px solid ${T.border}`,borderRadius:20,cursor:"pointer",textAlign:"left"}}>
                    {s}
                  </button>);
                })}
              </div>
              <div style={{padding:"12px 14px",background:T.sel,borderRadius:14,border:`1px solid ${T.border}`,display:"flex",gap:10,alignItems:"flex-start"}}>
                <Ico n="info" size={14} c={T.accentD}/>
                <p style={{fontSize:12,color:T.text,lineHeight:1.55,margin:0}}>
                  <span dangerouslySetInnerHTML={{__html: t("askdubi.info")}}/>
                </p>
              </div>
            </>
          )}

          {/* Messaggi conversazione */}
          {messages.map(msg => {
            if (msg.role === "user") {
              return (
                <div key={msg.id} style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
                  <div style={{maxWidth:"80%",padding:"11px 15px",background:T.accentD,borderRadius:"18px 18px 4px 18px"}}>
                    <p style={{fontSize:14,color:"#fff",margin:0,lineHeight:1.5}}>{msg.text}</p>
                  </div>
                </div>
              );
            }
            // messaggio DUBI
            const a = msg.ans;
            if (!a) return null;
            return (
              <div key={msg.id} style={{marginBottom:16}}>
                {/* Card risposta */}
                <div style={{padding:"14px 16px",background:T.card,border:`1.5px solid ${T.accent}`,borderRadius:18,marginBottom:a.planChange||a.offerAdd ? 8 : 0}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}>
                    <Ico n="info" size={13} c={T.accentD}/>
                    <span style={{fontSize:10,fontWeight:700,color:T.accentD,letterSpacing:0.5}}>{t("askdubi.response.label")}</span>
                  </div>
                  <p style={{fontSize:14,fontWeight:700,color:T.text,margin:"0 0 8px",lineHeight:1.35}}>{a.title}</p>
                  {(a.body||[]).map((line,i)=>(
                    <p key={i} style={{fontSize:13,color:T.text,lineHeight:1.6,margin:"0 0 5px"}}>{line}</p>
                  ))}
                  {a.source && <p style={{fontSize:11,color:T.muted,margin:"8px 0 0"}}>{t("askdubi.fonte")} {a.source}</p>}
                </div>

                {/* Offerta di aggiunta al piano (senza planChange diretto) */}
                {a.offerAdd && a.addableItem && !a.planChange && !msg.applied && (
                  <div style={{padding:"12px 16px",background:T.accentD+"10",border:`1.5px solid ${T.accentD}`,borderRadius:14,marginBottom:4}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:6}}>
                      <Ico n="refresh" size={13} c={T.accentD}/>
                      <span style={{fontSize:10,fontWeight:700,color:T.accentD,letterSpacing:0.5}}>{t("askdubi.offer.label")}</span>
                    </div>
                    <p style={{fontSize:13,color:T.text,lineHeight:1.5,margin:"0 0 10px"}}>
                      {t("askdubi.offer.q",{item:a.addableItem.label})}
                    </p>
                    <button onClick={()=>sendMessage(t("askdubi.offer.q",{item:a.addableItem.label}))}
                      style={{width:"100%",padding:"11px",background:T.accentD,color:"#fff",border:"none",
                        borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>
                      {t("askdubi.apply")}
                    </button>
                  </div>
                )}

                {/* Card adattamento piano (con planChange) */}
                {a.planChange && !msg.applied && (
                  <div style={{padding:"14px 16px",background:T.accentD+"12",border:`1.5px solid ${T.accentD}`,borderRadius:14}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}>
                      <Ico n="refresh" size={13} c={T.accentD}/>
                      <span style={{fontSize:10,fontWeight:700,color:T.accentD,letterSpacing:0.5}}>{t("askdubi.adapt.label")}</span>
                    </div>
                    <p style={{fontSize:13,color:T.text,lineHeight:1.5,margin:"0 0 12px"}}>{a.planChange.planNote}</p>
                    <button onClick={()=>applyChange(msg.id, a.planChange)}
                      style={{width:"100%",padding:"12px",background:T.accentD,color:"#fff",border:"none",
                        borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>
                      {a.planChange.confirmLabel}
                    </button>
                  </div>
                )}

                {/* Successo dopo apply */}
                {a.planChange && msg.applied && (
                  <div style={{padding:"12px 16px",background:T.sel,border:`1.5px solid ${T.accent}`,borderRadius:14,display:"flex",gap:10,alignItems:"center"}}>
                    <div style={{width:32,height:32,borderRadius:10,background:T.accentD,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <Ico n="check" size={16} c="#fff"/>
                    </div>
                    <div>
                      <p style={{fontSize:13,fontWeight:700,color:T.text,margin:"0 0 1px"}}>{t("askdubi.updated")}</p>
                      <p style={{fontSize:11,color:T.muted,margin:0}}>{t("askdubi.updated.sub")}</p>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Input fisso in fondo */}
        <div style={{padding:"12px 16px 32px",borderTop:`1px solid ${T.border}`,flexShrink:0,background:T.bg}}>
          <div style={{display:"flex",gap:8}}>
            <textarea
              value={q}
              onChange={e=>setQ(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage(q);}}}
placeholder={hasMessages ? t("askdubi.input.ph.followup") : t("askdubi.input.ph")}
              rows={2}
              style={{flex:1,padding:"12px 14px",fontSize:14,color:T.text,background:T.card,
                border:`1.5px solid ${T.border}`,borderRadius:14,outline:"none",resize:"none",lineHeight:1.5,fontFamily:"inherit"}} />
            <button onClick={()=>sendMessage(q)}
              style={{padding:"0 18px",background:T.accentD,color:"#fff",border:"none",borderRadius:14,
                fontSize:13,fontWeight:700,cursor:"pointer",alignSelf:"stretch",minWidth:64}}>
              {t("askdubi.send")}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

  const [mode, setMode] = useState(hasExistingSession ? "login" : "register");

  // Pre-fill email only for login mode

    if (newMode === "login") {
      setEmail(localStorage.getItem("dubi_email") || "");
    } else {
      setEmail("");
    }
  };

  const handleAuth = async () => {
    setError("");

    if (!email || !password) {
      setError("Please enter email and password.");
      return;
    }

    if (mode === "register" && password.length < 6) {
      setError("Password must be at least 6 characters.");
      return;

        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const data = await response.json();

      if (data.token) {
        localStorage.setItem("dubi_token", data.token);
        localStorage.setItem("dubi_email", email);

        try {
          const onboardingResponse = await fetch(`${API_BASE_URL}/api/onboarding/me`, {
            method: "GET",
            headers: { "Authorization": `Bearer ${data.token}` }
          });

          if (onboardingResponse.ok) {
            const onboardingData = await onboardingResponse.json();
            if (onboardingData.onboarding) {
              onSuccess(normalizeOnboarding(onboardingData.onboarding));
              return;
            }
          }
        } catch (onboardingError) {
          console.warn("Onboarding check after login failed:", onboardingError);

        onSuccess(null);
        return;
      }

      if (mode === "register") {
        setError("This email may already be registered. Try Login, or use a password with at least 6 characters.");

// ── Calcola la fase nutrizionale in base alle settimane alla gara ──
function calcRacePhase(competitionDate) {
  if (!competitionDate) return null;
  const today = new Date();
  const race  = new Date(competitionDate);
  const days  = Math.round((race - today) / (1000 * 60 * 60 * 24));
  const weeks = Math.round(days / 7);
  if (days < 0) return { labelKey:"race.phase.past",    color:"#C47B7B", adj:0,     noteKey:"race.phase.past.note",    icon:"info",    weeks:0 };
  if (weeks > 16) return { labelKey:"race.phase.base",   weeks, color:T.accentD,  adj:+0.08, noteKey:"race.phase.base.note",   icon:"leaf2" };
  if (weeks > 10) return { labelKey:"race.phase.develop",weeks, color:"#6B8A64",  adj:+0.04, noteKey:"race.phase.develop.note",icon:"zap" };
  if (weeks > 5)  return { labelKey:"race.phase.peak",   weeks, color:"#C9A87C",  adj:-0.05, noteKey:"race.phase.peak.note",   icon:"flame" };
  if (weeks > 1)  return { labelKey:"race.phase.taper",  weeks, color:"#9A8FBF",  adj:-0.10, noteKey:"race.phase.taper.note",  icon:"refresh" };
  return             { labelKey:"race.phase.raceweek", weeks:1, color:"#C47B7B", adj:0,     noteKey:"race.phase.raceweek.note",icon:"medal" };
}

  trainingTime:"sera",
  breakfastPref:"entrambi",
  dayStart:"07:00",
  dayEnd:"22:00",
  wearable:"apple"
};

  const safeTime = (value, fallback = "07:00") => {
  if (value === null || value === undefined || value === "") return fallback;

  if (typeof value === "string") {
    if (value.includes(":")) {
      const [hourRaw] = value.split(":");
      const hour = parseInt(hourRaw, 10);

      if (!Number.isNaN(hour) && hour >= 0 && hour <= 23) {
        return `${String(hour).padStart(2, "0")}:00`;
      }

      return fallback;
    }

    const hour = parseInt(value, 10);

    if (!Number.isNaN(hour) && hour >= 0 && hour <= 23) {
      return `${String(hour).padStart(2, "0")}:00`;
    }

    return fallback;
  }

  if (typeof value === "number" && !Number.isNaN(value)) {
    const hour = Math.floor(value);

    if (hour >= 0 && hour <= 23) {
      return `${String(hour).padStart(2, "0")}:00`;
    }
  }

  return fallback;
};
const normalizeInitialOnboardingData = (source) => {
  if (!source) return defaultOnboardingData;

  return {
    ...defaultOnboardingData,
    gender: source.gender || defaultOnboardingData.gender,
    age: source.age || defaultOnboardingData.age,
    height: source.height || defaultOnboardingData.height,
    weight: source.weight || defaultOnboardingData.weight,
    goal: source.goal || defaultOnboardingData.goal,
    targetWeight: source.target_weight || source.targetWeight || "",
    targetBodyFat: source.target_body_fat || source.targetBodyFat || "",
    competitionSport: source.competition_sport || source.competitionSport || "",
    competitionDate: source.competition_date || source.competitionDate || "",
    occupation: source.occupation || defaultOnboardingData.occupation,
    workoutDays: source.workout_days || source.workoutDays || defaultOnboardingData.workoutDays,
    workoutDuration: source.workout_duration || source.workoutDuration || defaultOnboardingData.workoutDuration,
    workoutIntensity: source.workout_intensity || source.workoutIntensity || defaultOnboardingData.workoutIntensity,
    dailySteps: source.daily_steps || source.dailySteps || "",
    sedentaryDays: source.sedentary_days || source.sedentaryDays || "",
    diet: source.diet || defaultOnboardingData.diet,
    allergies: source.allergies || "",
    sport: source.sport || "",
    trainingTime: source.training_time || source.trainingTime || defaultOnboardingData.trainingTime,
    breakfastPref: source.breakfast_pref || source.breakfastPref || defaultOnboardingData.breakfastPref,
    dayStart: safeTime(source.day_start || source.dayStart, "07:00"),
    dayEnd: safeTime(source.day_end || source.dayEnd, "22:00"),
    wearable: source.wearable_provider || source.wearable || defaultOnboardingData.wearable
  };
};

const [data, setData] = useState(() => normalizeInitialOnboardingData(initialData));
  useEffect(() => {
  if (isEditing) {
    setData((prev) => ({
      ...prev,
      dayStart: safeTime(prev.dayStart || prev.day_start, "07:00"),
      dayEnd: safeTime(prev.dayEnd || prev.day_end, "22:00"),
    }));
  }
}, [isEditing]);
  const u = (k,v) => setData(p=>({...p,[k]:v}));
  const content = [
    <PhysicalStep d={data} u={u}/>,
    <GoalStep
  d={data}
  u={u}
  isPremium={isEditing ? true : isPremium}
  onPremiumRequired={isEditing ? (() => {}) : onPremiumRequired}
/>,
<ActivityStep d={data} u={u}/>,
    <PreferencesStep d={data} u={u}/>,
    <WearableStep d={data} u={u}/>,
  ];

  
  return (
    <>
    {isEditing && (
  <button
    type="button"
    onClick={() => {
      localStorage.removeItem("dubi_edit_onboarding");
      onCancelEdit();
    }}
    style={{
      marginBottom: 12,
      fontSize: 13,
      color: T.muted,
      background: "transparent",
      border: "none",
      cursor: "pointer"
    }}
  >
    ← Back to settings
  </button>
)}
    <div style={{background:T.bg,minHeight:"100%",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"56px 24px 0",position:"relative"}}>
        <div style={{display:"flex",gap:4,marginBottom:28}}>
          {STEP_NAMES_KEYS.map((_,i)=>(<div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=step?T.accentD:T.border,transition:"background 0.3s"}} />))}
        </div>
        <p style={{fontSize:11,color:T.muted,letterSpacing:1,marginBottom:6}}>{t("onb.step",{a:step+1,b:STEP_NAMES_KEYS.length})}</p>
        <h2 style={{fontFamily:"'Manrope','Inter',sans-serif",fontSize:26,fontWeight:700,color:T.text,margin:0}}>{t(STEP_NAMES_KEYS[step])}</h2>
      </div>
      <div style={{flex:1,padding:"24px 24px 130px",overflowY:"auto"}}>{content[step]}</div>
      <div style={{padding:"16px 24px 40px",background:T.bg,borderTop:`1px solid ${T.border}`,position:"sticky",bottom:0}}>
        <div style={{display:"flex",gap:10}}>
          {step>0&&<button onClick={()=>setStep(s=>s-1)} style={{width:52,background:T.card,color:T.text,border:`1px solid ${T.border}`,borderRadius:50,fontSize:18,cursor:"pointer",flexShrink:0}}>←</button>}
          <button onClick={async () => {
  if (step < 4) {
    setStep(s => s + 1);
  } else {
    await saveOnboardingToBackend(data);
    onComplete(data);
  }
}}
            style={{flex:1,background:T.text,color:T.bg,border:"none",borderRadius:50,padding:18,fontSize:15,fontWeight:600,cursor:"pointer"}}>
            {step<4?t("onb.continue"):t("onb.generate")}
          </button>
        </div>
      </div>
    </div>
  </>
    );
};

// SAFETY REVIEW SCREEN — mostra findings di runSafetyChecks
// Principio: DUBI non rifiuta mai l'utente, ma guida e propone.
// ═══════════════════════════════════════════════
const SafetyReviewScreen = ({findings, rawData, onContinue, onEdit}) => {
  const { t, lang } = useT();
  const hards     = findings.filter(f => f.level === "hard");
  const softs     = findings.filter(f => f.level === "soft");
  const coherence = findings.filter(f => f.level === "coerenza");

  // Finding che richiedono scelta obbligatoria del goal
  const forceHards  = hards.filter(f => f.forceGoalChoice);
  const hasForce    = forceHards.length > 0;

  // Intersezione degli obiettivi consentiti da tutti i finding bloccanti
  const allowedIds = hasForce
    ? forceHards.reduce(
        (acc, f) => acc.filter(id => f.allowedGoals.includes(id)),
        ["fatLoss","definition","gain","maintain"]
      )
    : [];

  // Goal raccomandato = quello del primo finding bloccante
  const recommendedId = hasForce ? forceHards[0].recommendedGoal : null;

  const [chosenGoal, setChosenGoal] = useState(recommendedId || null);
  const canProceed = !hasForce || chosenGoal !== null;

  const GOAL_META = {
    maintain:{ic:"balance",tk:"goal.maintain.t",dk:"goal.maintain.d",color:"#9A8FBF"},
    gain:{ic:"dumbbell",tk:"goal.gain.t",dk:"goal.gain.d",color:T.accentD},
    fatLoss:{ic:"flame",tk:"goal.fatLoss.t",dk:"goal.fatLoss.d",color:"#C9A87C"},
    definition: {ic:"scissors", tk:"goal.definition.t", dk:"goal.definition.d", color:"#7A9FBF"},
  };

  const levelMeta = {
    hard:     {badgeKey:"safety.badge.hard",    color:"#C47B7B",  bg:"rgba(196,123,123,0.1)",  border:"rgba(196,123,123,0.4)"},
    soft:     {badgeKey:"safety.badge.soft",    color:"#C9A87C",  bg:"#C9A87C20",              border:"#C9A87C66"},
    coerenza: {badgeKey:"safety.badge.confirm", color:"#9A8FBF",  bg:"#9A8FBF18",              border:"#9A8FBF66"},
  };

  const isNonIT = lang !== "it";
  const renderCard = (f, i) => {
    const m = levelMeta[f.level] || levelMeta.hard;
    const cardTitle = isNonIT && f.titleEN ? f.titleEN : f.title;
    const cardBody  = isNonIT && f.bodyEN  ? f.bodyEN  : f.body;
    const cardNote  = isNonIT && f.noteEN  ? f.noteEN  : f.note;
    return (
      <div key={i} style={{background:T.card,border:`1.5px solid ${m.border}`,borderRadius:18,padding:"18px",marginBottom:12}}>
        <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:12}}>
          <div style={{width:38,height:38,borderRadius:12,background:m.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <Ico n={f.icon||"info"} size={18} c={m.color}/>
          </div>
          <div style={{flex:1}}>
            <span style={{fontSize:10,fontWeight:800,color:m.color,letterSpacing:0.8,display:"inline-block",padding:"3px 9px",borderRadius:20,background:m.bg}}>{t(m.badgeKey)}</span>
            <h3 style={{fontFamily:"'Manrope','Inter',sans-serif",fontSize:15,fontWeight:700,color:T.text,margin:"7px 0 0",lineHeight:1.35}}>{cardTitle}</h3>
          </div>
        </div>
        <div>
          {cardBody.map((p,j)=>(
            <p key={j} style={{fontSize:13,color:T.text,lineHeight:1.65,margin:"0 0 6px"}}>{p}</p>
          ))}
          {cardNote && (
            <p style={{fontSize:12,color:T.muted,fontStyle:"italic",lineHeight:1.6,margin:"10px 0 0",borderTop:`1px solid ${T.border}`,paddingTop:10}}>{cardNote}</p>
          )}
        </div>
      </div>
    );
  };

  return (
    <div style={{background:T.bg,minHeight:"100%",padding:"56px 24px 48px",overflowY:"auto"}}>

      {/* Header */}
      <div style={{marginBottom:24}}>
        <span style={{fontSize:11,color:"#C47B7B",letterSpacing:2,fontWeight:700}}>{t("safety.header.label")}</span>
        <h1 style={{fontFamily:"'Manrope','Inter',sans-serif",fontSize:26,fontWeight:700,color:T.text,margin:"8px 0 10px",letterSpacing:-0.5,lineHeight:1.25}}>
          {hasForce
            ? t("safety.header.force")
            : t("safety.header.ok")}
        </h1>
        <p style={{fontSize:14,color:T.muted,lineHeight:1.65,margin:0}}>
          {hasForce
            ? t("safety.sub.force")
            : t("safety.sub.ok")}
        </p>
      </div>

      {/* HARD cards */}
      {hards.length > 0 && (
        <>
          <p style={{fontSize:11,color:T.muted,letterSpacing:1,marginBottom:10,fontWeight:700}}>{t("safety.why.notFit")}</p>
          {hards.map(renderCard)}
        </>
      )}

      {/* ── FORCED GOAL SELECTOR ── */}
      {hasForce && (
        <div style={{marginTop:6,marginBottom:4}}>
          {/* Titolo sezione */}
          <div style={{padding:"14px 16px",background:"rgba(196,123,123,0.08)",borderRadius:14,
            border:"1.5px solid rgba(196,123,123,0.3)",marginBottom:16,display:"flex",gap:10,alignItems:"flex-start"}}>
            <Ico n="info" size={16} c="#C47B7B"/>
            <div>
              <p style={{fontSize:13,fontWeight:700,color:"#C47B7B",margin:"0 0 4px"}}>{t("safety.actionRequired")}</p>
              <p style={{fontSize:12,color:T.text,margin:0,lineHeight:1.6}}>
                {(isNonIT && forceHards[0].forceReasonEN) ? forceHards[0].forceReasonEN : forceHards[0].forceReason} {t("safety.actionRequired.sub")}
              </p>
            </div>
          </div>

          <p style={{fontSize:11,color:T.muted,letterSpacing:1,marginBottom:10,fontWeight:700}}>{t("safety.choose.goal")}</p>

          {allowedIds.map(id => {
            const g = GOAL_META[id];
            if (!g) return null;
            const isSel  = chosenGoal === id;
            const isRec  = id === recommendedId;
            return (
              <button key={id} onClick={()=>setChosenGoal(id)}
                style={{width:"100%",display:"flex",alignItems:"flex-start",gap:14,padding:"14px 16px",
                  marginBottom:10,borderRadius:16,textAlign:"left",cursor:"pointer",fontFamily:"inherit",
                  border:`2px solid ${isSel ? g.color : T.border}`,
                  background: isSel ? `${g.color}14` : T.card,
                  transition:"all 0.2s",position:"relative",overflow:"hidden"}}>
                {/* Recommended badge */}
                {isRec && (
                  <div style={{position:"absolute",top:10,right:10,background:`${g.color}22`,
                    borderRadius:8,padding:"3px 8px",display:"flex",alignItems:"center",gap:4}}>
                    <Ico n="star2" size={10} c={g.color}/>
                    <span style={{fontSize:9,fontWeight:800,color:g.color,letterSpacing:0.5}}>{t("safety.recommended")}</span>
                  </div>
                )}
                {/* Icon */}
                <div style={{width:44,height:44,borderRadius:14,flexShrink:0,
                  background: isSel ? `${g.color}22` : T.bg,
                  border:`1.5px solid ${isSel ? g.color : T.border}`,
                  display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <Ico n={g.ic} size={22} c={isSel ? g.color : T.muted}/>
                </div>
                {/* Text */}
                <div style={{flex:1,paddingRight: isRec ? 80 : 0}}>
                  <p style={{fontSize:15,fontWeight:700,color:T.text,margin:"0 0 4px"}}>{t(g.tk||"")}</p>
                  <p style={{fontSize:12,color:T.muted,margin:0,lineHeight:1.5}}>{t(g.dk||"")}</p>
                </div>
                {/* Check */}
                {isSel && (
                  <div style={{width:24,height:24,borderRadius:"50%",background:g.color,
                    display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2}}>
                    <Ico n="check" size={13} c="#fff"/>
                  </div>
                )}
              </button>
            );
          })}
        </div>
      )}

      {/* SOFT / COERENZA cards */}
      {softs.length > 0 && (
        <>
          <p style={{fontSize:11,color:T.muted,letterSpacing:1,margin:"16px 0 10px",fontWeight:700}}>{t("safety.section.consider")}</p>
          {softs.map(renderCard)}
        </>
      )}
      {coherence.length > 0 && (
        <>
          <p style={{fontSize:11,color:T.muted,letterSpacing:1,margin:"8px 0 10px",fontWeight:700}}>{t("safety.section.datacheck")}</p>
          {coherence.map(renderCard)}
        </>
      )}

      {/* Sources note */}
      <div style={{marginTop:20,padding:"12px 14px",background:T.sel,borderRadius:12,border:`1px solid ${T.border}`,display:"flex",alignItems:"flex-start",gap:10}}>
        <Ico n="book" size={14} c={T.accentD}/>
        <p style={{fontSize:11,color:T.muted,lineHeight:1.55,margin:0}}>
          {t("safety.sources.note")}
        </p>
      </div>

      {/* CTA buttons */}
      <button
        onClick={canProceed ? ()=>onContinue(chosenGoal) : undefined}
        style={{width:"100%",padding:"16px 24px",marginTop:20,
          background: canProceed ? T.accentD : "#ccc",
          color: canProceed ? "#fff" : "#888",
          border:"none",borderRadius:50,fontSize:15,fontWeight:700,
          cursor: canProceed ? "pointer" : "default",
          letterSpacing:0.2,transition:"background 0.25s, color 0.25s"}}>
        {hasForce
          ? canProceed
            ? t("safety.cta.proceed", {goal: t(GOAL_META[chosenGoal]?.tk || "")})
            : t("safety.cta.choose")
          : t("safety.cta.ok")}
      </button>
      <button onClick={onEdit}
        style={{width:"100%",padding:"14px 24px",marginTop:10,background:"none",color:T.muted,
          border:`1px solid ${T.border}`,borderRadius:50,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>
        {t("safety.cta.edit")}
      </button>
    </div>
  );
};

// PAYWALL SCREEN  (€10.99/month)

const PaywallScreen = ({ userData, plan, onContinue }) => {
  const { t } = useT();
  const isComp = userData?.goal === "competition";
  const [selected, setSelected] = useState(isComp ? "competition" : "standard");

  // ── Timeline obiettivo ────────────────────────────────────────────────────
  const targetW  = userData?.targetWeight ? parseFloat(userData.targetWeight) : null;
  const currentW = userData?.weight       ? parseFloat(userData.weight)       : null;
  const hasTarget = targetW && currentW && Math.abs(targetW - currentW) >= 0.5;
  let estimatedWeeks = null, estimatedMonths = null, diff = null, isLosing = false;
  if (hasTarget) {
    diff     = Math.abs(targetW - currentW);
    isLosing = targetW < currentW;
    const delta    = Math.abs((plan?.tdee || 2000) - (plan?.calories || 1800)) * 7;
    const rate     = Math.max(0.15, Math.min(1.2, delta > 0 ? delta / 7700 : (isLosing ? 0.5 : 0.3)));
    estimatedWeeks  = Math.round(diff / rate);
    estimatedMonths = Math.round(estimatedWeeks / 4.3);
  }

  const userName = userData?.name ? userData.name.split(" ")[0] : null;

  // ── Feature lists ─────────────────────────────────────────────────────────

            { userData?.goal === "competition" ? t("paywall.goal.competition")
