const TodayScreen = ({userData,plan,isFirstAccess,swaps}) => {
  const { t, lang } = useT();

  const [status,setStatus] = useState({});
  const [expanded,setExpanded] = useState(null);
  const [showWhy,setShowWhy] = useState({});
  const [skipText,setSkipText] = useState({});
  const [showSkipInput,setShowSkipInput] = useState(null);
  const [wearableModal,setWearableModal] = useState(null);
  const [ingModal,setIngModal] = useState(null);
  const [askOpen,setAskOpen] = useState(false);
  const [planAdaptations,setPlanAdaptations] = useState({skipped:[],banner:null,note:null,extraMeals:[]});

  // ── Anomalia wearable — rilevamento sbalzi improvvisi ──
  const [anomalyState, setAnomalyState] = React.useState(null); // null | "pending" | "yes" | "no"
  const [anomalyDecision, setAnomalyDecision] = React.useState(null);

  React.useEffect(() => {
    const today = new Date().toDateString();
    try {
      const stored = JSON.parse(sessionStorage.getItem("dubi_anomaly")||"{}");
      if (stored.date === today) return; // già mostrata oggi
    } catch(e) {}
    // Simulazione: ogni 3 giorni circa si rileva un'anomalia (giorno del mese divisibile per 3)
    // In produzione: confronto HRV/sleep odierni vs media 7gg dal wearable reale
    const d = new Date().getDate();
    if (d % 3 !== 0) return;
    const timer = setTimeout(() => {
      setAnomalyState("pending");
      try { sessionStorage.setItem("dubi_anomaly", JSON.stringify({date: today})); } catch(e) {}
    }, 6000);
    return () => clearTimeout(timer);
  }, []);

  const anomalyTxt = ANOMALY_TEXTS[lang] || ANOMALY_TEXTS.it;
  const confirmAnomaly = async (cause) => {
    const causeOption = ANOMALY_CAUSE_OPTIONS.find(o => o.id === cause) || ANOMALY_CAUSE_OPTIONS[ANOMALY_CAUSE_OPTIONS.length - 1];
    const attribution = causeOption.id;
    setAnomalyState(causeOption.id === "none_reported" ? "no" : "yes");
    setAnomalyDecision({
      attribution,
      action: causeOption.id === "none_reported" ? "monitor_48_72h" : "exclude_and_monitor",
      excludedFromRegeneration: causeOption.id !== "none_reported"
    });
    const result = await confirmAiAnomalyToBackend({
      anomaly_type: "acute_hrv_drop",
      metric: "hrv",
      current_value: 40,
      baseline_value: 52,
      delta_percent: -23,
      attribution,
      payload: {
        source: "home_anomaly_card",
        cause_id: causeOption.id,
        cause_label: causeOption.label
      }
    });

    if (result?.decision) {
      setAnomalyDecision(result.decision);
      try {
        sessionStorage.setItem("dubi_last_anomaly_decision", JSON.stringify(result.decision));
      } catch(e) {}
    }
  };

  // ── Notifica del giorno (2x) ──
  const [activeNotif, setActiveNotif] = React.useState(null);
  const [notifDismissed, setNotifDismissed] = React.useState(false);
  React.useEffect(() => {
    if (notifDismissed) return;
    const h = new Date().getHours();
    const slot = (h >= 6 && h < 14) ? "morning" : (h >= 17 && h < 23) ? "evening" : null;
    if (!slot) return;
    const pool = DUBI_NOTIFICATIONS.filter(n=>n.slot===slot);
    if (!pool.length) return;
    const today = new Date().toDateString();
    const storedKey = `dubi_notif_${slot}`;
    try {
      const stored = JSON.parse(sessionStorage.getItem(storedKey)||"{}");
      if (stored.date === today) return; // già mostrata oggi in questa sessione
      const pick = pool[Math.floor(Math.random()*pool.length)];
      const timer = setTimeout(() => {
        setActiveNotif(pick);
        sessionStorage.setItem(storedKey, JSON.stringify({date:today}));
      }, 1500);
      return () => clearTimeout(timer);
    } catch(e) {}
  }, [notifDismissed]);

  const handlePlanChange = (change) => {
    if (!change) return;
    if (change.action === "skip_meal") {
      setPlanAdaptations(a => ({
        ...a,
        skipped: [...new Set([...a.skipped, change.mealId])],
        banner: change.banner,
        note: change.planNote,
        extraMeals: change.extraMeal
          ? [...(a.extraMeals||[]).filter(m=>m.id!==change.extraMeal.id), change.extraMeal]
          : (a.extraMeals||[]),
      }));
      setStatus(s => ({...s, [change.mealId]: "skip"}));
    } else if (change.action === "skip_and_boost") {
      setPlanAdaptations(a => ({
        ...a,
        skipped: [...new Set([...a.skipped, change.mealId])],
        banner: change.banner,
        note: change.planNote,
        extraMeals: change.extraMeal
          ? [...(a.extraMeals||[]).filter(m=>m.id!==change.extraMeal.id), change.extraMeal]
          : (a.extraMeals||[]),
      }));
      setStatus(s => ({...s, [change.mealId]: "skip"}));
    } else if (change.action === "add_extra") {
      // Aggiunge un pasto extra senza saltare nulla (usato dal follow-up chat)
      setPlanAdaptations(a => ({
        ...a,
        banner: change.banner || a.banner,
        note: change.planNote || a.note,
        extraMeals: change.extraMeal
          ? [...(a.extraMeals||[]).filter(m=>m.id!==change.extraMeal.id), change.extraMeal]
          : (a.extraMeals||[]),
      }));
    } else if (change.action === "light_day") {
      setPlanAdaptations(a => ({
        ...a,
        banner: change.banner,
        note: change.planNote,
      }));
    } else if (change.action === "restaurant_note") {
      // Conferma visiva: mostra banner con guida ristorante
      setPlanAdaptations(a => ({
        ...a,
        banner: change.banner,
        note: change.planNote,
      }));
    } else if (change.action === "shift_times") {
      // Ricalcola orari pasti attorno all'orario di allenamento
      setPlanAdaptations(a => ({
        ...a,
        banner: change.banner,
        note: change.planNote,
        customTimes: change.customTimes,
        trainingHour: change.trainingHour,
      }));
    }
  };

  const greeting = getGreeting(userData?.name, isFirstAccess);

  const dayIdx = (new Date().getDay()+6)%7;
  const _dietMeals = getDietMeals(userData?.diet, null, userData?.allergies);
  const dayMeals = _dietMeals[dayIdx] || _dietMeals[0];
  const bfKey = userData.breakfastPref==="salata" ? "colazione_salata" : "colazione_dolce";

  const slots = getMealSlots(plan.mealCount || 4);
  // Se Ask DUBI ha ricalcolato gli orari per l'allenamento, usa quelli custom
  const times = planAdaptations.customTimes || plan.mealTimes || ["08:00","13:00","16:30","20:00"];

  const aiMealList = getAiMealListForDay(plan, dayIdx, slots, times);
  const fallbackMealList = slots.map((sl,i) => {
    let meal;
    if (sl.id==="colazione") meal = dayMeals[bfKey]||dayMeals.colazione_dolce;
    else if (sl.id==="pranzo") meal = dayMeals.pranzo;
    else if (sl.id==="cena") meal = dayMeals.cena;
    else if (sl.id==="snack") meal = dayMeals.snack;
    else if (sl.id==="snack_m") meal = dayMeals.snack_m;
    else if (sl.id==="snack_n") meal = dayMeals.snack_n;
    const wLabel = getWorkoutLabel(userData?.trainingTime, sl.id);
    const carbPct = getCarbTargetPct(userData?.trainingTime, sl.id, userData?.sport);
    const adaptSkipped = planAdaptations.skipped.includes(sl.id);
    return {...sl, time: times[i]||"--:--", data: meal || dayMeals.snack, workoutLabel: wLabel, carbTargetPct: carbPct, adaptSkipped};
  });
  const mealList = (aiMealList || fallbackMealList).concat((planAdaptations.extraMeals||[]));

  // ── MACRO SCALING — fattori indipendenti per ogni macro ──
  // Usa solo i pasti ATTIVI (non saltati da DUBI) per calcolare i fattori.
  // Così quando tutti i pasti attivi sono completati: cal=100%, P=100%, C=100%, G=100%.
  // I pasti "skip" di DUBI sono compensati da pasti extra → il totale rimane corretto.
  const activeMealList = mealList.filter(m => !planAdaptations.skipped.includes(m.id));
  const baseDayCalories = activeMealList.reduce((s,m) => s + (m.data?.macros?.cal||0), 0);
  const baseDayProtein  = activeMealList.reduce((s,m) => s + (m.data?.macros?.p||0), 0);
  const baseDayCarbs    = activeMealList.reduce((s,m) => s + (m.data?.macros?.c||0), 0);
  const baseDayFat      = activeMealList.reduce((s,m) => s + (m.data?.macros?.f||0), 0);
  const scaleK = baseDayCalories > 0 ? plan.calories / baseDayCalories : 1;
  const scaleP = baseDayProtein  > 0 ? plan.protein  / baseDayProtein  : scaleK;
  const scaleC = baseDayCarbs    > 0 ? plan.carbs    / baseDayCarbs    : scaleK;
  const scaleF = baseDayFat      > 0 ? plan.fat      / baseDayFat      : scaleK;
  const scaleMx = (mx) => ({
    cal: Math.round(mx.cal * scaleK),
    p:   Math.round(mx.p   * scaleP),
    c:   Math.round(mx.c   * scaleC),
    f:   Math.round(mx.f   * scaleF),
  });

  const done = mealList.filter(m=>status[m.id]==="done");
  const consumed = done.reduce((a,m)=>{
    const mx = scaleMx(m.data.macros);
    return {cal:a.cal+mx.cal, p:a.p+mx.p, f:a.f+mx.f, c:a.c+mx.c};
  },{cal:0,p:0,f:0,c:0});
  const today = new Date().toLocaleDateString((LANGUAGES.find(l=>l.code===lang)||LANGUAGES[0]).locale, {weekday:"long",day:"numeric",month:"long"});

  return (
    <div style={{paddingBottom:"calc(100px + env(safe-area-inset-bottom, 0px))"}}>

      {/* ── Notifica giornaliera DUBI (2x al giorno) ── */}
      {activeNotif && !notifDismissed && (
        <div style={{margin:"60px 16px 0",padding:"14px 16px",borderRadius:16,
          background:T.accentD,color:"#fff",display:"flex",alignItems:"flex-start",gap:12,boxShadow:"0 4px 16px rgba(0,0,0,.15)"}}>
          <div style={{width:34,height:34,borderRadius:10,background:"rgba(255,255,255,.15)",
            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span style={{fontSize:16}}>🔔</span>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:2}}>DUBI</div>
            <div style={{fontSize:13,fontWeight:600,marginBottom:3}}>{activeNotif.msg}</div>
            <div style={{fontSize:11,opacity:.82}}>{activeNotif.sub}</div>
          </div>
          <button onClick={()=>setNotifDismissed(true)}
            style={{background:"none",border:"none",color:"rgba(255,255,255,.6)",fontSize:18,cursor:"pointer",padding:"0 0 0 4px",flexShrink:0,lineHeight:1}}>×</button>
        </div>
      )}

      <div style={{padding:`${activeNotif && !notifDismissed ? "16px" : "56px"} 24px 20px`}}>
        <p style={{fontSize:13,color:T.muted,textTransform:"capitalize",marginBottom:2}}>{today}</p>
        <h1 style={{fontFamily:"'Manrope','Inter',sans-serif",fontSize:28,fontWeight:700,color:T.text,margin:0,letterSpacing:-0.5}}>
          {t(greeting.prefixKey)}{greeting.name ? `, ${greeting.name}` : ""}
        </h1>
        <p style={{fontSize:14,color:T.muted,margin:"4px 0 0"}}>
          {isFirstAccess
            ? t("today.subtitle.first",{n:plan.mealCount})
            : t("today.subtitle",{n:plan.mealCount})}
        </p>
      </div>

      {/* ── Weight target announcement banner (first access only) ── */}
      {isFirstAccess && userData?.targetWeight && userData?.weight && (
        (() => {
          const targetW = parseFloat(userData.targetWeight);
          const currentW = parseFloat(userData.weight);
          const diff = Math.abs(targetW - currentW);
          const isLosing = targetW < currentW;
          // Ritmo basato sul deficit calorico reale del piano (7700 kcal = 1 kg grasso corporeo)
          // Formula: |TDEE - kcal_piano| × 7 giorni / 7700 kcal·kg⁻¹ (Wishnofsky 1958, EFSA 2015)
          const weeklyKcalDelta = Math.abs((plan.tdee || 2000) - plan.calories) * 7;
          const actualRate = weeklyKcalDelta > 0 ? weeklyKcalDelta / 7700 : (isLosing ? 0.5 : 0.3);
          const safeRate = Math.max(0.15, Math.min(1.2, actualRate)); // clamp fisiologico 0.15–1.2 kg/sett
          const estimatedWeeks = Math.round(diff / safeRate);
          const estimatedMonths = Math.round(estimatedWeeks / 4.3);

          return (
            <div style={{margin:"0 24px 18px",padding:"14px 16px",
              background:"linear-gradient(135deg, rgba(107,138,100,0.15), rgba(107,138,100,0.08))",
              borderRadius:14,border:"1.5px solid rgba(107,138,100,0.4)"}}>
              <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                <div style={{width:36,height:36,borderRadius:10,background:"rgba(107,138,100,0.25)",
                  display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <Ico n="medal" size={18} c="#6B8A64"/>
                </div>
                <div style={{flex:1}}>
                  <p style={{fontSize:12,fontWeight:700,color:"#6B8A64",margin:0,textTransform:"uppercase",letterSpacing:0.5}}>
                    {t("today.weight.goal.label")}
                  </p>
                  <p style={{fontSize:14,fontWeight:600,color:T.text,margin:"4px 0 0"}}>
                    {isLosing ? "−" : "+"}{diff.toFixed(1)} kg
                  </p>
                  <p style={{fontSize:11,color:"#5A7A53",margin:"6px 0 0",lineHeight:1.5}}>
                    <span dangerouslySetInnerHTML={{__html: t("today.banner.estimate",{kg:`<strong>${targetW} kg</strong>`,weeks:`<strong>${estimatedWeeks}</strong>`,months:estimatedMonths})}} />
                  </p>
                </div>
              </div>
            </div>
          );
        })()
      )}

      {/* Wearable — cliccabile */}
      <div style={{padding:"0 24px",marginBottom:14}}>
        <p style={{fontSize:11,color:T.muted,letterSpacing:1,marginBottom:10}}>{t("today.wearable.label")}</p>
        <div style={{display:"flex",gap:8}}>
          <Chip icon={<Ico n="steps" size={16} c={T.accent}/>} label={t("today.wearable.steps")} value="8.234" color={T.accent} onClick={()=>setWearableModal("passi")}/>
          <Chip icon={<Ico n="zap" size={16} c="#C9A87C"/>} label={t("today.wearable.cal")} value="480" color="#C9A87C" onClick={()=>setWearableModal("calorie")}/>
          <Chip icon={<Ico n="moon" size={16} c="#9A8FBF"/>} label={t("today.wearable.sleep")} value="7h 12" color="#9A8FBF" onClick={()=>setWearableModal("sonno")}/>
          <Chip icon={<Ico n="heart" size={16} c="#C47B7B"/>} label={t("today.wearable.hrv")} value="52ms" color="#C47B7B" onClick={()=>setWearableModal("hrv")}/>
        </div>
      </div>

      {/* ── Anomalia wearable — card contestuale ── */}
      {anomalyState && anomalyState !== "dismissed" && (
        <div style={{margin:"0 24px 18px",borderRadius:18,overflow:"hidden",
          border:`1.5px solid ${anomalyState==="yes" ? "rgba(107,138,100,.45)" : anomalyState==="no" ? "rgba(201,168,124,.45)" : "rgba(196,123,123,.45)"}`,
          background: anomalyState==="yes" ? "rgba(107,138,100,.07)" : anomalyState==="no" ? "rgba(201,168,124,.07)" : "#FFF8F8",
          boxShadow:"0 2px 12px rgba(0,0,0,.06)"}}>

          {/* Header */}
          <div style={{padding:"12px 16px 0",display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:30,height:30,borderRadius:9,
              background: anomalyState==="yes" ? "rgba(107,138,100,.15)" : anomalyState==="no" ? "rgba(201,168,124,.15)" : "rgba(196,123,123,.15)",
              display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <span style={{fontSize:15}}>
                {anomalyState==="yes" ? "✓" : anomalyState==="no" ? "📊" : "⚡"}
              </span>
            </div>
            <div>
              <p style={{fontSize:9,fontWeight:700,letterSpacing:1.2,color:T.muted,margin:0}}>{anomalyTxt.badge}</p>
              <p style={{fontSize:13,fontWeight:700,color:T.text,margin:0}}>{anomalyTxt.title}</p>
            </div>
          </div>

          {/* Corpo */}
          <div style={{padding:"10px 16px 14px"}}>
            {anomalyState === "pending" && (
              <>
                <p style={{fontSize:12,color:T.muted,lineHeight:1.55,margin:"0 0 12px"}}>{anomalyTxt.desc}</p>
                {/* Indicatore HRV visivo */}
                <div style={{display:"flex",alignItems:"center",gap:10,margin:"0 0 14px",padding:"10px 12px",
                  background:"rgba(196,123,123,.1)",borderRadius:10}}>
                  <div style={{flexShrink:0}}>
                    <Ico n="heart" size={18} c="#C47B7B"/>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{fontSize:11,color:T.muted}}>HRV oggi</span>
                      <span style={{fontSize:11,color:"#C47B7B",fontWeight:700}}>40 ms</span>
                    </div>
                    <div style={{height:6,borderRadius:3,background:"#E7E2DA",overflow:"hidden"}}>
                      <div style={{height:"100%",width:"40%",borderRadius:3,background:"#C47B7B"}}/>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
                      <span style={{fontSize:10,color:T.muted}}>Media 7gg: 52 ms</span>
                      <span style={{fontSize:10,color:"#C47B7B",fontWeight:600}}>−23%</span>
                    </div>
                  </div>
                </div>
                {/* Domanda */}
                <p style={{fontSize:13,fontWeight:600,color:T.text,margin:"0 0 12px",lineHeight:1.45}}>
                  {anomalyTxt.question}
                </p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {ANOMALY_CAUSE_OPTIONS.map(option => {
                    const isNone = option.id === "none_reported";
                    return (
                      <button key={option.id} onClick={()=>confirmAnomaly(option.id)}
                        style={{padding:"10px 10px",borderRadius:12,
                          border:`1.5px solid ${isNone ? T.border : "rgba(107,138,100,.45)"}`,
                          background:isNone ? T.card : T.sel,color:isNone ? T.text : T.accentD,
                          fontWeight:700,fontSize:11,cursor:"pointer",textAlign:"left",lineHeight:1.25}}>
                        <span style={{display:"block",fontSize:12,marginBottom:2}}>{option.label}</span>
                        <span style={{display:"block",fontSize:10,fontWeight:500,color:T.muted}}>{option.detail}</span>
                      </button>
                    );
                  })}
                </div>
              </>
            )}

            {(anomalyState === "yes" || anomalyState === "no") && (
              <>
                <p style={{fontSize:13,color: anomalyState==="yes" ? T.accentD : "#C9A87C",
                  fontWeight:600,lineHeight:1.5,margin:"0 0 12px"}}>
                  {anomalyDecision?.excludedFromRegeneration ? anomalyTxt.respYes : anomalyTxt.respNo}
                </p>
                <button onClick={()=>setAnomalyState("dismissed")}
                  style={{padding:"9px 20px",borderRadius:11,border:"none",
                    background: anomalyState==="yes" ? T.accentD : "#C9A87C",
                    color:"#fff",fontWeight:600,fontSize:12,cursor:"pointer"}}>
                  {anomalyTxt.dismiss}
                </button>
              </>
            )}
          </div>
        </div>
      )}

      {/* Chiedi a DUBI */}
      <div style={{padding:"0 24px",marginBottom:18}}>
        <button onClick={()=>setAskOpen(true)}
          style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"14px 16px",
            background:T.card,border:`1.5px solid ${T.border}`,borderRadius:16,cursor:"pointer",textAlign:"left",
            transition:"all 0.2s"}}>
          <div style={{width:36,height:36,borderRadius:11,background:T.accentD+"18",
            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <Ico n="info" size={18} c={T.accentD}/>
          </div>
          <div style={{flex:1}}>
            <p style={{fontSize:13,fontWeight:600,color:T.text,margin:0}}>{t("today.askDubi")}</p>
            <p style={{fontSize:11,color:T.muted,margin:"2px 0 0"}}>{t("today.askDubi.sub")}</p>
          </div>
          <Ico n="chev" size={16} c={T.muted}/>
        </button>
      </div>

      {/* Nota carboidrati */}
      {plan.carbNote && (
        <div style={{margin:"0 24px 18px",padding:14,background:T.sel,borderRadius:14,border:`1px solid ${T.border}`}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
            <div style={{flexShrink:0,marginTop:1}}><Ico n="leaf2" size={14} c={T.accentD}/></div>
            <p style={{fontSize:12,color:T.accentD,lineHeight:1.5,margin:0}}>{t(plan.carbNote)}</p>
          </div>
        </div>
      )}

      {/* Macros */}
      <div style={{margin:"0 24px 18px",padding:20,background:T.card,border:`1px solid ${T.border}`,borderRadius:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:16}}>
          <div>
            <p style={{fontSize:11,color:T.muted,margin:0,letterSpacing:0.5}}>{t("today.kcalConsumed")}</p>
            <p style={{fontSize:30,fontWeight:700,color:T.text,margin:"4px 0 0",letterSpacing:-1}}>
              {consumed.cal} <span style={{fontSize:14,fontWeight:400,color:T.muted}}>/ {plan.calories} kcal</span>
            </p>
          </div>
          <div style={{textAlign:"right"}}>
            <p style={{fontSize:11,color:T.muted,margin:0}}>{t("today.mealsDone",{a:done.length,b:mealList.length})}</p>
            <p style={{fontSize:14,fontWeight:600,color:T.accentD,margin:"2px 0 0"}}>{Math.round((consumed.cal/plan.calories)*100)}%</p>
          </div>
        </div>
        <MacroBar label={t("today.macro.prot")} current={consumed.p} max={plan.protein} color={T.accent} />
        <MacroBar label={t("today.macro.carb")} current={consumed.c} max={plan.carbs} color="#C9A87C" />
        <MacroBar label={t("today.macro.fat")} current={consumed.f} max={plan.fat} color="#9A8FBF" />
        {/* ── Tasso perdita/guadagno atteso (ACSM · Wishnofsky 1958) ── */}
        {plan.weeklyLossKg !== undefined && plan.weeklyLossKg !== 0 && (plan.goal === "fatLoss" || plan.goal === "definition" || plan.goal === "gain") && (() => {
          const isGain   = plan.goal === "gain";
          const rate     = Math.abs(plan.weeklyLossKg).toFixed(2);
          const inRange  = !isGain
            ? (Math.abs(plan.weeklyLossKg) >= 0.25 && Math.abs(plan.weeklyLossKg) <= 1.0)
            : (Math.abs(plan.weeklyLossKg) >= 0.1  && Math.abs(plan.weeklyLossKg) <= 0.5);
          const dotColor = inRange ? T.accentD : "#C9A87C";
          const label = lang !== "it"
            ? (isGain ? `~${rate} kg/week gain · ACSM range 0.1–0.5 kg` : `~${rate} kg/week loss · ACSM range 0.25–1.0 kg`)
            : (isGain ? `~${rate} kg/settimana guadagno · range ACSM 0,1–0,5 kg` : `~${rate} kg/settimana di perdita · range ACSM 0,25–1,0 kg`);
          return (
            <div style={{marginTop:12,paddingTop:10,borderTop:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:7}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:dotColor,flexShrink:0}}/>
              <p style={{fontSize:11,color:T.muted,margin:0,lineHeight:1.4}}>{label}</p>
            </div>
          );
        })()}
      </div>

      {/* Banner adattamento piano da DUBI */}
      {planAdaptations.banner && (
        <div style={{margin:"0 24px 16px",padding:14,background:"rgba(107,138,100,0.12)",borderRadius:16,border:`1.5px solid ${T.accentD}`,display:"flex",gap:10,alignItems:"flex-start"}}>
          <div style={{width:32,height:32,borderRadius:10,background:T.accentD,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
            <Ico n="refresh" size={16} c={T.white}/>
          </div>
          <div style={{flex:1}}>
            <p style={{fontSize:12,fontWeight:700,color:T.accentD,margin:"0 0 3px",letterSpacing:0.3}}>{t("today.adapt.banner")}</p>
            <p style={{fontSize:13,color:T.text,margin:"0 0 4px",lineHeight:1.4}}>{planAdaptations.banner}</p>
            {planAdaptations.note && (
              <p style={{fontSize:11,color:T.muted,margin:0,lineHeight:1.5}}>{planAdaptations.note}</p>
            )}
            <button onClick={()=>{
              // ripristina i pasti saltati
              const newStatus = {...status};
              planAdaptations.skipped.forEach(id=>{ if(newStatus[id]==="skip") delete newStatus[id]; });
              (planAdaptations.extraMeals||[]).forEach(m=>{ delete newStatus[m.id]; });
              setStatus(newStatus);
              setPlanAdaptations({skipped:[],banner:null,note:null,extraMeals:[]});
            }}
              style={{marginTop:8,padding:"5px 12px",borderRadius:8,background:"transparent",border:`1px solid ${T.accentD}`,color:T.accentD,fontSize:11,cursor:"pointer",fontWeight:600}}>
              {t("today.adapt.reset")}
            </button>
          </div>
        </div>
      )}

      {/* Meals */}
      <div style={{padding:"0 24px"}}>
        <p style={{fontSize:11,color:T.muted,letterSpacing:1,marginBottom:12}}>{t("today.meals")}</p>
        {mealList.map(mt => {
          const st = status[mt.id];
          const isOpen = expanded===mt.id;
          const meal = mt.data;
          return (
            <div key={mt.id} style={{marginBottom:10,background:st==="done"?T.sel:mt.isExtra?"rgba(107,138,100,0.07)":T.card,border:`1.5px solid ${mt.adaptSkipped?"#9A8FBF":mt.isExtra?T.accentD:st==="done"?T.accent:T.border}`,borderRadius:18,overflow:"hidden",opacity:st==="skip"?0.5:1,transition:"opacity 0.2s"}}>
              <button onClick={()=>setExpanded(isOpen?null:mt.id)}
                style={{width:"100%",display:"flex",alignItems:"center",padding:"15px 16px",background:"none",border:"none",cursor:"pointer",gap:12}}>
                <div style={{width:38,height:38,borderRadius:12,background:st==="done"?T.accentD+"22":T.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:`1px solid ${st==="done"?T.accent:T.border}`}}>
                  <Ico n={mt.icon||"fork"} size={18} c={st==="done"?T.accentD:T.muted}/>
                </div>
                <div style={{flex:1,textAlign:"left"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    <span style={{fontSize:15,fontWeight:600,color:T.text}}>{t(mt.labelKey||"meal."+mt.id)}</span>
                    {mt.isExtra && (
                      <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:8,
                        background:"rgba(107,138,100,0.22)",color:T.accentD}}>
                        ✦ {t("today.badge.added")}
                      </span>
                    )}
                    {mt.adaptSkipped && (
                      <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:8,
                        background:"rgba(154,143,191,0.18)",color:"#9A8FBF"}}>
                        {t("today.badge.removed")}
                      </span>
                    )}
                    {mt.workoutLabel && (
                      <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:8,
                        background:mt.workoutLabel==="PRE"?"rgba(201,168,124,0.18)":"rgba(107,138,100,0.18)",
                        color:mt.workoutLabel==="PRE"?"#B8893A":T.accentD}}>
                        {mt.workoutLabel==="PRE"?t("today.preWorkout"):t("today.postWorkout")}
                      </span>
                    )}
                    {mt.carbTargetPct && (
                      <span style={{fontSize:10,padding:"2px 7px",borderRadius:8,background:"rgba(201,168,124,0.12)",color:"#B8893A"}}>
                        {t("today.target",{pct:mt.carbTargetPct})}
                      </span>
                    )}
                  </div>
                  <div style={{fontSize:12,color:T.muted}}>{mt.time} · {scaleMx(meal.macros).cal} kcal · {scaleMx(meal.macros).p}g prot</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {st==="done"&&<div style={{width:22,height:22,borderRadius:"50%",background:T.accentD,display:"flex",alignItems:"center",justifyContent:"center"}}><Ico n="check" size={11} c={T.white}/></div>}
                  <div style={{transform:isOpen?"rotate(90deg)":"rotate(0)",transition:"0.2s"}}><Ico n="chev" size={16} c={T.muted}/></div>
                </div>
              </button>
              {isOpen && (
                <div style={{padding:"0 16px 16px"}}>
                  <div style={{borderTop:`1px solid ${T.border}`,paddingTop:12,marginBottom:14}}>
                    <p style={{fontSize:11,color:T.muted,letterSpacing:0.5,marginBottom:8}}>{t("today.ingredients")}</p>
                    {meal.items.map((item,i)=>{
                      const _tSwapKey = `${dayIdx}-${mt.id}-${i}`;
                      const _tDispItem = (swaps && swaps[_tSwapKey]) ? swaps[_tSwapKey] : item;
                      const _tName = splitIngredientDisplay(_tDispItem).name;
                      return (
                      <div key={i} onClick={()=>setIngModal(_tDispItem)}
                        style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,padding:"6px 8px",borderRadius:10,cursor:"pointer",background:"transparent",border:`1px solid transparent`,transition:"all 0.15s"}}
                        onMouseEnter={e=>{e.currentTarget.style.background=T.sel;e.currentTarget.style.borderColor=T.border;}}
                        onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor="transparent";}}>
                        <div style={{width:5,height:5,borderRadius:"50%",background:T.accent,flexShrink:0}} />
                        <span style={{fontSize:14,color:T.text,flex:1}}>{localizeFood(_tName, lang)}</span>
                        <Ico n="chev" size={12} c={T.muted}/>
                      </div>
                      );
                    })}
                    <div style={{display:"flex",gap:6,marginTop:10}}>
                      {(()=>{const smx=scaleMx(meal.macros);return[{l:t("today.macro.short.p"),v:`${smx.p}g`,c:T.accent},{l:t("today.macro.short.c"),v:`${smx.c}g`,c:"#C9A87C"},{l:t("today.macro.short.f"),v:`${smx.f}g`,c:"#9A8FBF"}];})().map(m=>(
                        <div key={m.l} style={{flex:1,background:T.bg,borderRadius:10,padding:"8px 6px",textAlign:"center"}}>
                          <div style={{fontSize:14,fontWeight:700,color:m.c}}>{m.v}</div>
                          <div style={{fontSize:10,color:T.muted}}>{m.l}</div>
                        </div>
                      ))}
                    </div>
                    {Math.abs(scaleK - 1) > 0.05 && (
                      <div style={{marginTop:8,padding:"6px 10px",background:T.sel,borderRadius:8,display:"flex",alignItems:"center",gap:6}}>
                        <Ico n="info" size={11} c={T.accentD}/>
                        <span style={{fontSize:10,color:T.accentD,lineHeight:1.4}}>
                          {t("today.portions.info",{n:plan.calories})}
                        </span>
                      </div>
                    )}
                  </div>
                  {meal.why && (
                    <button onClick={()=>setShowWhy(s=>({...s,[mt.id]:!s[mt.id]}))}
                      style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"10px 12px",marginBottom:12,borderRadius:12,background:T.sel,border:`1px solid ${T.border}`,cursor:"pointer"}}>
                      <Ico n="info" size={16} c={T.accentD} />
                      <span style={{fontSize:13,color:T.accentD,fontWeight:500,flex:1,textAlign:"left"}}>{t("today.why")}</span>
                      <span style={{fontSize:12,color:T.muted,transform:showWhy[mt.id]?"rotate(90deg)":"rotate(0)",transition:"0.2s"}}>›</span>
                    </button>
                  )}
                  {showWhy[mt.id] && meal.why && (
                    <div style={{padding:14,marginBottom:12,background:T.bg,borderRadius:12,border:`1px solid ${T.border}`}}>
                      <p style={{fontSize:13,color:T.text,lineHeight:1.6,margin:0}}>{(lang==="en"&&meal.whyEN)||meal.why}</p>
                    </div>
                  )}
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>{setStatus(s=>({...s,[mt.id]:"done"}));setExpanded(null);}}
                      style={{flex:1,padding:11,borderRadius:12,background:T.accentD,color:T.white,border:"none",fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                      <Ico n="check" size={16} c={T.bg}/> Fatto
                    </button>
                    <button onClick={()=>setShowSkipInput(mt.id)}
                      style={{flex:1,padding:11,borderRadius:12,background:T.bg,color:T.muted,border:`1px solid ${T.border}`,fontSize:14,cursor:"pointer"}}>
                      {t("today.skip")}
                    </button>
                  </div>
                  {showSkipInput===mt.id && (
                    <div style={{marginTop:10}}>
                      <p style={{fontSize:12,color:T.muted,marginBottom:6}}>{t("today.skip.q")}</p>
                      <textarea value={skipText[mt.id]||""} onChange={e=>setSkipText(s=>({...s,[mt.id]:e.target.value}))}
                        placeholder={t("today.skip.ph")}
                        style={{width:"100%",padding:10,borderRadius:10,border:`1px solid ${T.border}`,background:T.bg,fontSize:13,fontFamily:"inherit",resize:"none",minHeight:44,outline:"none",color:T.text}} />
                      <button onClick={()=>{setStatus(s=>({...s,[mt.id]:"skip"}));setExpanded(null);setShowSkipInput(null);}}
                        style={{width:"100%",marginTop:6,padding:10,borderRadius:10,background:T.card,border:`1px solid ${T.border}`,fontSize:13,color:T.text,cursor:"pointer"}}>
                        {t("today.skip.confirm")}
                      </button>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{margin:"18px 24px 0",padding:16,background:T.sel,borderRadius:16,border:`1px solid ${T.border}`,display:"flex",gap:12,alignItems:"flex-start"}}>
        <Ico n="refresh" size={18} c={T.accentD} />
        <div>
          <p style={{fontSize:13,fontWeight:600,color:T.text,margin:"0 0 3px"}}>{t("today.adapt.t")}</p>
          <p style={{fontSize:12,color:T.muted,margin:0,lineHeight:1.5}}>{t("today.adapt.d")}</p>
        </div>
      </div>

      {wearableModal && <WearableModal type={wearableModal} onClose={()=>setWearableModal(null)}/>}
      {ingModal && <IngredientModal ingredient={ingModal} onClose={()=>setIngModal(null)}/>}
      {askOpen && <AskDubiModal onClose={()=>setAskOpen(false)} userData={userData} plan={plan} onPlanChange={handlePlanChange}/>}
    </div>
  );
};

// ═══════════════════════════════════════════════
// WEEKLY SCREEN — per-day breakfast + alts per tutti
// ═══════════════════════════════════════════════
const WeeklyScreen = ({userData,plan,swaps,setSwaps}) => {
  const { t, lang } = useT();

  const todayIdx = (new Date().getDay()+6)%7;
  const [selDay,setSelDay] = useState(todayIdx);
  const [swapOpen,setSwapOpen] = useState(null);
  const [swapNotif,setSwapNotif] = useState(null); // {from, to}
  const [shoppingPrompt,setShoppingPrompt] = useState(null);
  const [ingModal,setIngModal] = useState(null);

  // ── Banner stagionale — visibile ad ogni accesso, svanisce dopo 30s ──
  const [showSeasonBanner, setShowSeasonBanner] = useState(true);
  React.useEffect(() => {
    setShowSeasonBanner(true); // reset ad ogni mount (ogni volta che si entra nella tab)
    const t30 = setTimeout(() => setShowSeasonBanner(false), 30000);
    return () => clearTimeout(t30);
  }, []);

  const _seasonBannerText = {
    it: { msg:"Frutta e verdura scelte in base alla stagione", sub:"Gli ingredienti vegetali del piano rispettano la stagionalità del mese corrente — il valore nutrizionale è al suo massimo naturale." },
    en: { msg:"Fruit & vegetables chosen by season", sub:"Plant ingredients follow the current month's seasonality — nutritional value is at its natural peak." },
    de: { msg:"Obst & Gemüse nach Saison ausgewählt", sub:"Pflanzliche Zutaten folgen der Saisonalität des aktuellen Monats — der Nährwert ist auf seinem natürlichen Höchststand." },
    fr: { msg:"Fruits & légumes choisis selon la saison", sub:"Les ingrédients végétaux respectent la saisonnalité du mois en cours — la valeur nutritionnelle est à son maximum naturel." },
    es: { msg:"Frutas y verduras elegidas por temporada", sub:"Los ingredientes vegetales siguen la estacionalidad del mes actual — el valor nutricional está en su máximo natural." },
    pt: { msg:"Frutas e vegetais escolhidos pela estação", sub:"Os ingredientes vegetais seguem a sazonalidade do mês atual — o valor nutricional está em seu máximo natural." },
    zh: { msg:"水果和蔬菜按季节选择", sub:"植物性食材遵循当月的季节性——营养价值处于自然最高点。" },
    ja: { msg:"季節に合わせた果物と野菜", sub:"植物性食材は今月の旬に合わせています — 栄養価は自然の最高点にあります。" },
    ar: { msg:"الفواكه والخضروات مختارة حسب الموسم", sub:"المكونات النباتية تتبع موسمية الشهر الحالي — القيمة الغذائية في ذروتها الطبيعية." },
    ru: { msg:"Фрукты и овощи выбраны по сезону", sub:"Растительные ингредиенты соответствуют сезонности текущего месяца — питательная ценность на естественном максимуме." },
  };
  const _sb = _seasonBannerText[lang] || _seasonBannerText.it;
  const _monthName = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"][new Date().getMonth()];
  const defBf = userData.breakfastPref==="salata" ? "salata" : "dolce";
  const [dayBfPrefs,setDayBfPrefs] = useState(Array(7).fill(defBf));
  const days = [0,1,2,3,4,5,6].map(i=>t("days.short."+i));

  const weekMeals = getDietMeals(userData?.diet, null, userData?.allergies);
  const dayMeals = weekMeals[selDay] || weekMeals[0];
  const bfKey = dayBfPrefs[selDay]==="salata" ? "colazione_salata" : "colazione_dolce";

  const slots = getMealSlots(plan.mealCount || 4);
  const times = plan.mealTimes || ["08:00","13:00","16:30","20:00"];

  const aiWeeklyMeals = getAiMealListForDay(plan, selDay, slots, times);
  const fallbackMealEntries = slots.map((sl,i) => {
    let meal;
    if (sl.id==="colazione") meal = dayMeals[bfKey]||dayMeals.colazione_dolce;
    else if (sl.id==="pranzo") meal = dayMeals.pranzo;
    else if (sl.id==="cena") meal = dayMeals.cena;
    else if (sl.id==="snack") meal = dayMeals.snack;
    else if (sl.id==="snack_m") meal = dayMeals.snack_m;
    else if (sl.id==="snack_n") meal = dayMeals.snack_n;
    const wLabel = getWorkoutLabel(userData?.trainingTime, sl.id);
    const carbPct = getCarbTargetPct(userData?.trainingTime, sl.id, userData?.sport);
    return {...sl, time: times[i]||"--:--", meal: meal || dayMeals.snack, workoutLabel: wLabel, carbTargetPct: carbPct};
  });
  const mealEntries = aiWeeklyMeals
    ? aiWeeklyMeals.map(m => ({...m, meal: m.data}))
    : fallbackMealEntries;
  const adjustedMealEntries = mealEntries.map(entry => ({
    ...entry,
    meal: {
      ...entry.meal,
      macros: getAdjustedMealMacros(selDay, entry.id, entry.meal, swaps)
    }
  }));

  // Fattori di scala indipendenti per macro (stessa logica di TodayScreen)
  const wBaseCal = adjustedMealEntries.reduce((s,m) => s + (m.meal?.macros?.cal||0), 0);
  const wBaseP   = adjustedMealEntries.reduce((s,m) => s + (m.meal?.macros?.p||0),   0);
  const wBaseC   = adjustedMealEntries.reduce((s,m) => s + (m.meal?.macros?.c||0),   0);
  const wBaseF   = adjustedMealEntries.reduce((s,m) => s + (m.meal?.macros?.f||0),   0);
  const wScaleK  = wBaseCal > 0 ? plan.calories / wBaseCal : 1;
  const wScaleP  = wBaseP   > 0 ? plan.protein  / wBaseP   : wScaleK;
  const wScaleC  = wBaseC   > 0 ? plan.carbs    / wBaseC   : wScaleK;
  const wScaleF  = wBaseF   > 0 ? plan.fat      / wBaseF   : wScaleK;
  const wScaleMx = (mx) => ({
    cal: Math.round(mx.cal * wScaleK),
    p:   Math.round(mx.p   * wScaleP),
    c:   Math.round(mx.c   * wScaleC),
    f:   Math.round(mx.f   * wScaleF),
  });

  const applyIngredientSwap = ({swapKey, mealKey, itemIdx, oldItem, replacement, hadAtHome = null}) => {
    if (hadAtHome) rememberOwnedShoppingIngredient(userData, replacement);
    setSwaps(s=>({...s,[swapKey]:replacement}));
    saveIngredientSwapToBackend({
      swap_key: swapKey,
      day_index: selDay,
      meal_key: mealKey,
      item_index: itemIdx,
      original_ingredient: formatFoodText(oldItem),
      replacement_ingredient: replacement,
      had_at_home: hadAtHome
    });
    setSwapOpen(null);
    setShoppingPrompt(null);
    setSwapNotif({from: oldItem || "ingrediente", to: replacement});
    setTimeout(()=>setSwapNotif(null), 4500);
  };

  const doSwap = (mealKey,itemIdx,newItem,oldItem) => {
    const swapKey = `${selDay}-${mealKey}-${itemIdx}`;
    const replacement = formatFoodText(newItem);
    const original = formatFoodText(oldItem);
    const nextSwaps = {...swaps, [swapKey]: replacement};
    const coverageBefore = findShoppingCoverage(userData, plan, swaps, replacement);
    const coverageAfter = findShoppingCoverage(userData, plan, nextSwaps, replacement);

    if (!coverageBefore.checked && !coverageAfter.checked) {
      setShoppingPrompt({swapKey, mealKey, itemIdx, oldItem: original, replacement});
      return;
    }

    applyIngredientSwap({swapKey, mealKey, itemIdx, oldItem: original, replacement});
  };

  return (
    <div style={{paddingBottom:"calc(100px + env(safe-area-inset-bottom, 0px))"}}>

      {/* ── Notifica swap ingrediente ── */}
      {swapNotif && (
        <div style={{position:"fixed",top:16,left:16,right:16,zIndex:999,borderRadius:16,
          background:T.accentD,color:"#fff",padding:"14px 16px",boxShadow:"0 4px 20px rgba(0,0,0,.18)",
          display:"flex",flexDirection:"column",gap:4,
          animation:"slideDown .25s ease"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <Ico n="check" size={16} c="#fff"/>
            <span style={{fontSize:14,fontWeight:700}}>Ingrediente aggiornato</span>
          </div>
          <p style={{fontSize:12,opacity:.88,lineHeight:1.4,paddingLeft:24}}>
            <span style={{textDecoration:"line-through",opacity:.65}}>{swapNotif.from.split("(")[0].trim()}</span>
            {" → "}<strong>{swapNotif.to.split("(")[0].trim()}</strong>
          </p>
          <p style={{fontSize:11,opacity:.75,paddingLeft:24}}>📋 Lista della spesa aggiornata automaticamente.</p>
        </div>
      )}

      {shoppingPrompt && (
        <div style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(35,33,29,.28)",
          backdropFilter:"blur(3px)",display:"flex",alignItems:"flex-end",justifyContent:"center",
          padding:"18px 16px calc(18px + env(safe-area-inset-bottom, 0px))"}}>
          <div style={{width:"100%",maxWidth:520,background:T.card,border:`1.5px solid ${T.border}`,
            borderRadius:22,boxShadow:"0 18px 50px rgba(35,33,29,.22)",padding:18,
            animation:"slideUp .22s ease"}}>
            <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:14}}>
              <div style={{width:40,height:40,borderRadius:14,background:T.sel,border:`1px solid ${T.border}`,
                display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <Ico n="bag" size={20} c={T.accentD}/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontSize:15,fontWeight:800,color:T.text,margin:"0 0 5px"}}>
                  Lo hai gia' in casa?
                </p>
                <p style={{fontSize:13,color:T.muted,lineHeight:1.5,margin:0}}>
                  <strong style={{color:T.text}}>{localizeFood(shoppingPrompt.replacement, lang)}</strong> non risulta gia' spuntato nella lista della spesa.
                </p>
              </div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>applyIngredientSwap({...shoppingPrompt, hadAtHome:false})}
                style={{flex:1,padding:"13px 12px",borderRadius:14,background:T.card,
                  border:`1.5px solid ${T.border}`,color:T.text,fontSize:14,fontWeight:700,cursor:"pointer"}}>
                No, aggiungilo
              </button>
              <button onClick={()=>applyIngredientSwap({...shoppingPrompt, hadAtHome:true})}
                style={{flex:1,padding:"13px 12px",borderRadius:14,background:T.accentD,
                  border:`1.5px solid ${T.accentD}`,color:T.white,fontSize:14,fontWeight:800,cursor:"pointer"}}>
                Si, ce l'ho
              </button>
            </div>
          </div>
        </div>
      )}

      <div style={{padding:"56px 24px 20px"}}>
        <h2 style={{fontFamily:"'Manrope','Inter',sans-serif",fontSize:26,fontWeight:700,color:T.text,margin:"0 0 4px"}}>{t("weekly.title")}</h2>
        <p style={{fontSize:14,color:T.muted}}>{t("weekly.target",{kcal:plan.calories,p:plan.protein,n:plan.mealCount})}</p>
      </div>

      {/* ── Banner stagionalità — svanisce dopo 30s, si riattiva ad ogni accesso ── */}
      {showSeasonBanner && (
        <div style={{margin:"0 16px 14px",padding:"12px 14px",borderRadius:14,
          background:"rgba(107,138,100,.1)",border:"1.5px solid rgba(107,138,100,.3)",
          display:"flex",alignItems:"flex-start",gap:10,
          animation:"slideDown .3s ease"}}>
          <div style={{width:32,height:32,borderRadius:10,background:"rgba(107,138,100,.15)",
            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
            <Ico n="leaf2" size={17} c={T.accentD}/>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
              <span style={{fontSize:12,fontWeight:700,color:T.accentD}}>{_sb.msg}</span>
              <span style={{fontSize:10,padding:"1px 7px",borderRadius:8,background:"rgba(107,138,100,.18)",
                color:T.accentD,fontWeight:600,flexShrink:0}}>{_monthName}</span>
            </div>
            <p style={{fontSize:11,color:T.accentD,opacity:.82,lineHeight:1.5,margin:0}}>{_sb.sub}</p>
          </div>
          <button onClick={()=>setShowSeasonBanner(false)}
            style={{background:"none",border:"none",color:"rgba(107,138,100,.5)",fontSize:18,
              cursor:"pointer",padding:"0 0 0 4px",flexShrink:0,lineHeight:1,marginTop:-1}}>×</button>
        </div>
      )}

      {/* Day selector */}
      <div style={{display:"flex",gap:6,padding:"0 24px",marginBottom:12,overflowX:"auto"}}>
        {days.map((d,i)=>{
          const date=new Date(); date.setDate(date.getDate()+(i-todayIdx));
          return (
            <button key={d} onClick={()=>setSelDay(i)}
              style={{minWidth:46,padding:"8px 4px",borderRadius:14,background:selDay===i?T.text:(i===todayIdx?T.sel:T.card),border:`1px solid ${selDay===i?T.text:T.border}`,cursor:"pointer",textAlign:"center"}}>
              <div style={{fontSize:10,color:selDay===i?"#AAA":T.muted,marginBottom:3}}>{d}</div>
              <div style={{fontSize:15,fontWeight:600,color:selDay===i?T.bg:T.text}}>{date.getDate()}</div>
            </button>
          );
        })}
      </div>

      {/* Breakfast toggle per giorno */}
      <div style={{padding:"0 24px",marginBottom:14}}>
        <div style={{display:"flex",gap:8}}>
          {[{id:"dolce",ic:"sunrise",lk:"weekly.bf.sweet"},{id:"salata",ic:"fork",lk:"weekly.bf.salty"}].map(o=>(
            <button key={o.id} onClick={()=>setDayBfPrefs(p=>{const n=[...p];n[selDay]=o.id;return n;})}
              style={{flex:1,padding:"10px 12px",borderRadius:12,border:`1.5px solid ${dayBfPrefs[selDay]===o.id?T.accent:T.border}`,background:dayBfPrefs[selDay]===o.id?T.sel:T.card,cursor:"pointer",textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
              <Ico n={o.ic} size={15} c={dayBfPrefs[selDay]===o.id?T.accentD:T.muted}/>
              <span style={{fontSize:13,fontWeight:dayBfPrefs[selDay]===o.id?600:400,color:T.text}}>{t(o.lk)}</span>
            </button>
          ))}
        </div>
      </div>

      {/* Macro pills */}
      <div style={{display:"flex",gap:8,padding:"0 24px",marginBottom:20}}>
        {[{l:"kcal",v:plan.calories,c:T.text},{l:t("macro.prot"),v:`${plan.protein}g`,c:T.accent},{l:t("macro.carb"),v:`${plan.carbs}g`,c:"#C9A87C"},{l:t("macro.fat"),v:`${plan.fat}g`,c:"#9A8FBF"}].map(m=>(
          <div key={m.l} style={{flex:1,background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:"10px 4px",textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:700,color:m.c}}>{m.v}</div>
            <div style={{fontSize:10,color:T.muted}}>{m.l}</div>
          </div>
        ))}
      </div>

      {/* Carboidrati note */}
      {plan.carbNote && (
        <div style={{margin:"0 24px 16px",padding:12,background:T.sel,borderRadius:12,border:`1px solid ${T.border}`}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:7}}>
            <div style={{flexShrink:0,marginTop:1}}><Ico n="leaf2" size={13} c={T.accentD}/></div>
            <p style={{fontSize:11,color:T.accentD,lineHeight:1.5,margin:0}}>{t(plan.carbNote)}</p>
          </div>
        </div>
      )}

      {/* Meals con swap */}
      <div style={{padding:"0 24px"}}>
        {adjustedMealEntries.map(({id:mKey,label,icon,time,meal,workoutLabel,carbTargetPct})=>(
          <div key={mKey} style={{marginBottom:10,padding:16,background:T.card,border:`1.5px solid ${workoutLabel?T.accent:T.border}`,borderRadius:16}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
                <div style={{width:34,height:34,borderRadius:10,background:workoutLabel?T.accentD+"18":T.bg,display:"flex",alignItems:"center",justifyContent:"center",border:`1px solid ${workoutLabel?T.accent:T.border}`,flexShrink:0}}>
                  <Ico n={icon||"fork"} size={16} c={workoutLabel?T.accentD:T.muted}/>
                </div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    <span style={{fontSize:14,fontWeight:600,color:T.text}}>{label}</span>
                    {workoutLabel && (
                      <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:8,
                        background:workoutLabel==="PRE"?"rgba(201,168,124,0.2)":"rgba(107,138,100,0.2)",
                        color:workoutLabel==="PRE"?"#B8893A":T.accentD}}>
                        {workoutLabel==="PRE"?"PRE":"POST"}

// ── Raddoppia le quantità numeriche nelle stringhe (es. "500g" → "1kg") ──
function doubleQuantity(item) {
  return item.replace(/\((\d+(?:\.\d+)?)\s*(g|ml|kg|l|pz|cl)\)/gi, (_, n, unit) => {
    let num = parseFloat(n) * 2;
    let u = unit.toLowerCase();
    if (u === "g"  && num >= 1000) { num = num/1000; u = "kg"; }
    if (u === "ml" && num >= 1000) { num = num/1000; u = "l"; }
    const fmt = num % 1 === 0 ? num.toString() : num.toFixed(1);
    return `(${fmt}${u})`;
  });
}

  const { t, lang } = useT();

  const [checked, setChecked] = useState(() => {
    try { return JSON.parse(localStorage.getItem(shoppingStorageKey(userData)) || "{}"); } catch(e) { return {}; }

  const resetAll = () => setChecked({});

  React.useEffect(() => {
    try { setChecked(JSON.parse(localStorage.getItem(shoppingStorageKey(userData)) || "{}")); } catch(e) { setChecked({}); }
  }, [userData?.dubiCode]);

  React.useEffect(() => {
    try { localStorage.setItem(shoppingStorageKey(userData), JSON.stringify(checked)); } catch(e) {}
  }, [checked, userData?.dubiCode]);

  // ── Lista personalizzata per l'utente corrente ──
  const myShop = React.useMemo(()=>getPersonalizedShopping(userData, plan, swaps), [userData, plan, swaps]);

  // ── Lista finale: merged se partner attivo, altrimenti solo la mia ──
  // Ogni entry è {item:string, tag:string|null}
  const activeShop = React.useMemo(() => {
    if (partnerMode && partnerProfile?.userData && partnerProfile?.plan) {
      const partnerName = partnerProfile.userData.dubiCode || "Partner";
      const myName      = userData?.dubiCode || "Tu";
      const partShop    = getPersonalizedShopping(partnerProfile.userData, partnerProfile.plan);

    // Solo io: wrap in {item, tag:null}
    const wrapped = {};
    Object.entries(myShop).forEach(([cat, items]) => {
      wrapped[cat] = items.map(item=>({item, tag:null}));

    return entries;

const ProgressScreen = ({userData, plan, onOpenWrap, onAiPlanRefresh}) => {
  const { t, lang } = useT();

  const [weightLog, setWeightLog] = useState(MOCK_METRIC_DATA.peso.map(d=>({week:d.w,weight:d.v})));
  const [newWeight, setNewWeight] = useState("");
  const [progressMessage, setProgressMessage] = useState("");
  const [savingProgress, setSavingProgress] = useState(false);
  const [activeMetric, setActiveMetric] = useState("peso");
  const [trendView, setTrendView] = useState("summary");
  const [progressHistory, setProgressHistory] = useState([]);
  const [editingProgressId, setEditingProgressId] = useState(null);
  const [editingWeight, setEditingWeight] = useState("");
  
  useEffect(() => {
  const loadProgressHistory = async () => {
    const history = await fetchProgressHistory();
    setProgressHistory(history);
  };

  loadProgressHistory();
}, []);
  const [showWeeklyReport, setShowWeeklyReport] = useState(false);

  const startWeight = weightLog[0]?.weight || userData?.weight || 78;
  const currentWeight = weightLog[weightLog.length-1]?.weight || startWeight;
  const totalLost = (startWeight - currentWeight).toFixed(1);
  const weeklyAvg = weightLog.length > 1 ? (totalLost / (weightLog.length-1)).toFixed(2) : "0.00";

  const trend = weightLog.length >= 3
    ? (currentWeight < weightLog[weightLog.length-3].weight ? "onTrack"
      : currentWeight === weightLog[weightLog.length-3].weight ? "slowing" : "notYet")
    : "notYet";

  const _motivIdx = Math.floor(Date.now()/86400000) % 3 + 1; const motivMsg = t("motiv."+trend+"."+_motivIdx);
  const trendColor = trend==="onTrack"?T.accentD:(trend==="slowing"?"#C9A87C":"#9A8FBF");
  const trendLabel = t(trend==="onTrack"?"prog.trend.onTrack.plain":(trend==="slowing"?"prog.trend.slowing.plain":"prog.trend.notYet.plain"));
  const trendIcon  = trend==="onTrack"?"trend":(trend==="slowing"?"balance":"leaf2");

  const addWeight = () => {
    const val = parseFloat(newWeight);
    if (isNaN(val) || val < 30 || val > 300) return;
    const week = "S."+(weightLog.length+1);
    setWeightLog(prev=>[...prev,{week,weight:val}]);
    setNewWeight("");
  };

  // Build chart data for active metric
  const metricRaw = activeMetric==="peso"
    ? weightLog.map(d=>({label:d.week, value:d.weight}))
    : MOCK_METRIC_DATA[activeMetric].map(d=>({label:d.w, value:d.v}));

  const cfg = METRIC_CFG[activeMetric];

  // Week-over-week comparison
  const lastVal = metricRaw[metricRaw.length-1]?.value || 0;
  const prevVal = metricRaw[metricRaw.length-2]?.value || lastVal;
  const wowDiff = (lastVal - prevVal);
  const wowPct = prevVal ? ((wowDiff/prevVal)*100).toFixed(1) : "0.0";
  const wowPositive = cfg.inv ? wowDiff < 0 : wowDiff >= 0;
  const wowSign = wowDiff >= 0 ? "+" : "";

  const improvements = [
    {icon:"dumbbell",color:"#C47B7B", labelKey:"prog.imp.lean.l", value:"+0.3 kg", noteKey:"prog.imp.lean.n"},
    {icon:"zap",color:"#C9A87C", labelKey:"prog.imp.tdee.l", value:`${plan?.tdee || 2100} kcal`, noteKey:"prog.imp.tdee.n"},
    {icon:"moon",    color:"#9A8FBF", label:t("prog.imp.sleep.l"),        value:"76/100",                   note:t("prog.imp.sleep.n")},
    {icon:"heart",   color:"#C47B7B", label:t("prog.imp.hrv.l"),            value:"52 ms",                    note:t("prog.imp.hrv.n")},
    {icon:"flame",   color:"#C9A87C", label:t("prog.imp.cal.l"), value:"2.840 kcal",               note:undefined},
    {icon:"steps",   color:T.accentD, label:t("prog.metric.steps"),       value:"8.234",                    note:undefined},
    {icon:"drop",    color:"#7BA8C4", label:t("prog.imp.water.l"),          value:`2.1 ${t("prog.water.unit")}`,             note:t("prog.imp.water.n")},
    {icon:"trend",   color:T.accentD, label:t("prog.imp.adherence.l"),          value:"87%",                      note:t("prog.imp.adherence.n")},

  const handleSaveProgress = async () => {
  setProgressMessage("");

  const weightValue = Number(newWeight || currentWeight || userData?.weight || 0);

  if (!weightValue) {
    setProgressMessage("Please enter your current weight first.");
    return;
  }

  const mealsTotal = plan?.meals ? plan.meals.length : 0;

  const progressPayload = {
    weight: weightValue,
    calories_consumed: Number(plan?.calories || plan?.kcal || 0),
    meals_completed: mealsTotal,
    meals_total: mealsTotal,
    adherence_percent: 100,
    note: "Manual progress check-in"
  };

  setSavingProgress(true);

  const [result, aiWeightResult] = await Promise.all([
    saveProgressToBackend(progressPayload),
    logAiWeightToBackend(weightValue)
  ]);

  setSavingProgress(false);

  if (result) {
    const week = "S."+(weightLog.length+1);
    setWeightLog(prev=>[...prev,{week,weight:weightValue}]);
    setNewWeight("");
    refreshProgressHistory();

    if (aiWeightResult?.regenerated && aiWeightResult.plan && onAiPlanRefresh) {
      onAiPlanRefresh(aiWeightResult.plan, weightValue);
      setProgressMessage("Progress saved. DUBI regenerated your plan from the new weight trend.");
    } else if (aiWeightResult?.decision?.explanation) {
      setProgressMessage(`Progress saved. ${aiWeightResult.decision.explanation}`);
    } else {
      setProgressMessage("Progress saved successfully.");
    }
  } else {
    setProgressMessage("Progress could not be saved. Please try again.");
  }

const WrapScreen = ({userData, plan, onClose}) => {
  const { t, lang } = useT();
  const [slide, setSlide] = useState(0);
  const [counter, setCounter] = useState({meals:0,days:0,steps:0});
  const TOTAL = 6;

  const goalLabel = {fatLoss:t("goal.fatLoss.t"),maintain:t("goal.maintain.t"),gain:t("goal.gain.t"),definition:t("goal.definition.t")}[plan?.goal||"fatLoss"];
  const firstName = userData?.name ? userData.name.split(" ")[0] : "";

  useEffect(()=>{
    if(slide===1){
      let f=0;
      const targets={meals:168,days:42,steps:312000};
      const iv=setInterval(()=>{
        f=Math.min(f+3,100);
        setCounter({meals:Math.round(targets.meals*f/100),days:Math.round(targets.days*f/100),steps:Math.round(targets.steps*f/100)});
        if(f>=100)clearInterval(iv);
      },18);
      return()=>clearInterval(iv);
    }
  },[slide]);

  // Clean line chart — same aesthetic as Progress screen
  const LineMini = ({data,color=T.accentD,height=90}) => {
    const W=300,H=height,pad=14;
    const vals=data.map(d=>d.v);
    const mn=Math.min(...vals),mx=Math.max(...vals),range=mx-mn||1;

    workoutDays: String(pick("workout_days", userData?.workoutDays || "0")),
    workoutDuration: pick("workout_duration", userData?.workoutDuration || "45-60"),
    workoutIntensity: pick("workout_intensity", userData?.workoutIntensity || "moderata"),
    dailySteps: pick("daily_steps", userData?.dailySteps || "unknown"),
    sedentaryDays: Number(pick("sedentary_days", userData?.sedentaryDays || 0)),
    diet: pick("diet", userData?.diet || "omnivore"),
    allergies: pick("allergies", userData?.allergies || ""),
    sport: pick("sport", userData?.sport || ""),
    trainingTime: pick("training_time", userData?.trainingTime || "varies"),
    breakfastPref: pick("breakfast_pref", userData?.breakfastPref || "entrambi"),
    dayStart: Number(pick("day_start", userData?.dayStart || 7)),
    dayEnd: Number(pick("day_end", userData?.dayEnd || 22)),
    wearable: pick("wearable_provider", userData?.wearable || "none")
  };

  setSavingProfile(true);

  const saved = await saveOnboardingToBackend(updatedData);

  if (!saved) {
    setSavingProfile(false);
    setProfileMessage("Could not save profile changes. Please try again.");
    return;
  }

  setUserData(updatedData);
  saveDubiProfile(updatedData);
  if (selectedProfileImpactsDiet) {
    const { plan: updatedPlan, savedByAi } = await generateAiPlanFromBackend(updatedData);
    setPlan(updatedPlan);
    if (!savedByAi) await savePlanToBackend(updatedPlan, updatedData);
  }

  setSavingProfile(false);
  setEditingProfile(false);
  setConfirmProfileSave(false);
  setProfileMessage(t("set.edit.success"));
};

  if (submitted) {
    return (
      <div style={{background:T.bg,minHeight:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 20px",textAlign:"center"}}>
        <div style={{width:72,height:72,borderRadius:"50%",background:T.accentD,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:24}}>
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <h2 style={{fontFamily:"'Manrope','Inter',sans-serif",fontSize:24,fontWeight:800,color:T.text,margin:"0 0 12px"}}>Consent request sent!</h2>
        <p style={{fontSize:14,color:T.muted,lineHeight:1.6,marginBottom:8}}>
          We sent a consent form to <strong style={{color:T.text}}>{parentEmail}</strong>.
        </p>
        <p style={{fontSize:13,color:T.muted,lineHeight:1.6,marginBottom:32}}>
          Your parent or guardian needs to open the email, review the form, and sign it digitally. Your DUBI account will be activated as soon as they complete the process.
        </p>
        {needsDocument && (
          <div style={{background:T.sel,borderRadius:12,padding:"12px 16px",marginBottom:24,textAlign:"left",width:"100%"}}>
            <p style={{fontSize:12,color:T.accentD,fontWeight:700,margin:"0 0 4px"}}>📎 Document required</p>
            <p style={{fontSize:12,color:T.muted,margin:0,lineHeight:1.5}}>Because you are under 16, a copy of your parent's identity document is also required. This is included in the consent form they received.</p>
          </div>
        )}
        <button
          onClick={onComplete}
          style={{width:"100%",padding:"16px",borderRadius:16,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#6B8A64,#4A6844)",color:"#fff",fontSize:15,fontWeight:700}}
        >
          Got it, I'll wait for confirmation
        </button>
      </div>
    );
  }

  return (
    <div style={{background:T.bg,minHeight:"100%",overflowY:"auto",paddingBottom:40}}>
      <div style={{padding:"56px 20px 0"}}>
        <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",padding:"0 0 16px",display:"flex",alignItems:"center",gap:6}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={T.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          <span style={{fontSize:13,color:T.muted}}>Back</span>
        </button>
        <div style={{width:56,height:56,borderRadius:16,background:"#FAEEDA",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:16}}>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#854F0B" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <h1 style={{fontFamily:"'Manrope','Inter',sans-serif",fontSize:24,fontWeight:800,color:T.text,letterSpacing:-0.8,margin:"0 0 8px"}}>Parental consent required</h1>
        <p style={{fontSize:14,color:T.muted,lineHeight:1.6,margin:"0 0 8px"}}>
          Because you are <strong style={{color:T.text}}>{age} years old</strong>, we need your parent or guardian to authorise your DUBI account before you can start.
        </p>
        <p style={{fontSize:13,color:T.muted,lineHeight:1.5,margin:"0 0 28px"}}>
          This is required by EU law (GDPR) and UAE PDPL to protect minors' health data. The process takes less than 2 minutes.
        </p>
      </div>

      <div style={{padding:"0 20px"}}>
        <div style={{marginBottom:24}}>
          {[
            {n:"1", title:"Enter your parent's email", desc:"We will send them a consent form with a secure link."},
            {n:"2", title:"Parent reviews and signs", desc:`They enter their name and sign digitally.${needsDocument ? " A copy of their ID is also required." : ""}`},
            {n:"3", title:"Your account activates", desc:"You receive a confirmation email and can start your plan."}
          ].map(step => (
            <div key={step.n} style={{display:"flex",gap:14,marginBottom:16,alignItems:"flex-start"}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:T.accentD,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{fontSize:12,fontWeight:800,color:"#fff"}}>{step.n}</span>
              </div>
              <div>
                <p style={{margin:"2px 0 2px",fontSize:13,fontWeight:700,color:T.text}}>{step.title}</p>
                <p style={{margin:0,fontSize:12,color:T.muted,lineHeight:1.5}}>{step.desc}</p>
              </div>
            </div>
          ))}
        </div>

        <div style={{marginBottom:12}}>
          <p style={{fontSize:10,fontWeight:700,color:T.muted,letterSpacing:1.2,textTransform:"uppercase",marginBottom:8}}>Parent / Guardian full name</p>
          <input type="text" placeholder="e.g. Mario Rossi" value={parentName} onChange={e=>setParentName(e.target.value)}
            style={{width:"100%",padding:"14px 16px",borderRadius:12,border:`1px solid ${T.border}`,background:T.card,color:T.text,fontSize:14,outline:"none"}}/>
        </div>

        <div style={{marginBottom:12}}>
          <p style={{fontSize:10,fontWeight:700,color:T.muted,letterSpacing:1.2,textTransform:"uppercase",marginBottom:8}}>Parent / Guardian email address</p>
          <input type="email" placeholder="parent@email.com" value={parentEmail} onChange={e=>setParentEmail(e.target.value)}
            style={{width:"100%",padding:"14px 16px",borderRadius:12,border:`1px solid ${T.border}`,background:T.card,color:T.text,fontSize:14,outline:"none"}}/>
        </div>

        {needsDocument && (
          <div style={{background:"#FAEEDA",borderRadius:12,padding:"12px 16px",marginBottom:12}}>
            <p style={{fontSize:12,color:"#854F0B",fontWeight:600,margin:0,lineHeight:1.5}}>
              📎 Since you are under 16, your parent will also need to upload a copy of their identity document (passport or national ID) in the consent form.
            </p>
          </div>
        )}

        {error && <p style={{fontSize:12,color:"#E24B4A",marginBottom:12}}>{error}</p>}

        <button onClick={handleSubmit}
          style={{width:"100%",padding:"16px",borderRadius:16,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#6B8A64,#4A6844)",color:"#fff",fontSize:15,fontWeight:700,marginBottom:12}}>
          Send consent request →
        </button>

        <p style={{fontSize:11,color:T.muted,textAlign:"center",lineHeight:1.5}}>
          The consent form will be sent immediately. Your parent has 7 days to complete it before the request expires.
        </p>
      </div>
    </div>
  );
};

function DUBIApp() {
  const [phase,setPhase] = useState("checking");
  const [authError, setAuthError] = useState("");
  const [userData,setUserData] = useState(null);
  const [plan,setPlan] = useState(null);
  const [activeTab,setActiveTab] = useState("today");
  useEffect(() => {
  if (phase === "app") {
    setActiveTab("today");
  }
}, [phase]);
  useEffect(() => {
  const checkUserSession = async () => {
    const token = localStorage.getItem("dubi_token");

    if (!token) {
      setPhase("welcome");
      return;
    }

    try {
      const response = await fetch(`${API_BASE_URL}/api/onboarding/me`, {
        method: "GET",
        headers: {
          "Authorization": `Bearer ${token}`
        }
      });

      if (response.ok) {
        const data = await response.json();

       if (data.onboarding) {
  const normalizedOnboarding = normalizeOnboarding(data.onboarding);

  setUserData(normalizedOnboarding);

  const currentAiPlan = await fetchCurrentAiPlanFromBackend(normalizedOnboarding);
  const sessionPlan = currentAiPlan || (await generateAiPlanFromBackend(normalizedOnboarding)).plan || calcPlan(normalizedOnboarding);
  setPlan(sessionPlan);
  setSwaps(await fetchIngredientSwapsFromBackend());

  setActiveTab("today");
  setPhase("app");
  return;
}
      }

      setPhase("onboarding");
    } catch (error) {
      console.error("Session check failed:", error);
      setPhase("welcome");
    }
  };

  checkUserSession();
}, []);
  const [showWrap,setShowWrap] = useState(false);
  const [isFirstAccess,setIsFirstAccess] = useState(true);
  const [safetyReview,setSafetyReview] = useState(null);
  const [isPremium,setIsPremium] = useState(false);
  const handlePremiumUpgrade = () => setIsPremium(true);
const handleLogout = () => {
  localStorage.removeItem("dubi_token");
  localStorage.removeItem("dubi_email");
  setUserData(null);
  setPlan(null);
  setActiveTab("today");
  setPhase("welcome");
};
  const [swaps, setSwaps] = useState({});
  const [partnerProfile,setPartnerProfile] = useState(null);
  const [consentData, setConsentData] = useState(null);

  const handleAiPlanRefreshFromProgress = (aiPlan, weightValue) => {
    const nextUserData = {...userData, weight: weightValue};
    const refreshedPlan = mapAiPlanToFrontend(aiPlan, nextUserData);
    setUserData(nextUserData);
    setPlan(refreshedPlan);
    setSwaps({});
    saveDubiProfile(nextUserData);
  };

  const handleComplete = data => {
    
    // Safety engine: rileva regole HARD/SOFT/COERENZA
    const sc = runSafetyChecks(data);
    if (sc.findings.length > 0) {
      setSafetyReview({ rawData: data, findings: sc.findings });
      setPhase("safety");
      return;
    }
    finalizeData(data);
  };

  const finalizeData = async data => {
    
    // Genera codice DUBI univoco se non esiste già
    if (!data.dubiCode) data = {...data, dubiCode: generateDubiCode()};
    // Salva profilo in localStorage per il collegamento con altri profili
    saveDubiProfile(data);
    setUserData(data);

  const { plan: generatedPlan, savedByAi } = await generateAiPlanFromBackend(data);
setPlan(generatedPlan);
if (!savedByAi) await savePlanToBackend(generatedPlan, data);

const isEditingOnboarding = localStorage.getItem("dubi_edit_onboarding") === "true";
localStorage.removeItem("dubi_edit_onboarding");

if (isEditingOnboarding) {
  setActiveTab("today");
  setPhase("app");
  return;
}

if (data.age && data.age < 18) {
  setPhase("minor");
} else {
  setPhase("consent");
}
  };

  // Quando l'utente entra nell'app (tab today) la prima volta, disattiva isFirstAccess dopo qualche secondo
  useEffect(() => {
    if (phase === "app" && isFirstAccess) {
      const t = setTimeout(() => setIsFirstAccess(false), 30000);
      return () => clearTimeout(t);
    }
  }, [phase, isFirstAccess]);

  return (
    <div style={{fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,sans-serif",background:"#E8E4DF",minHeight:"100vh",display:"flex",justifyContent:"center"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@600;700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        button,input,textarea{font-family:'Inter',-apple-system,sans-serif;}
        ::-webkit-scrollbar{display:none;}
      `}</style>
      <div style={{width:"100%",maxWidth:430,background:T.bg,minHeight:"100vh",position:"relative",overflow:"hidden",boxShadow:"0 0 60px rgba(0,0,0,0.12)"}}>
        {phase==="checking" && (
  <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:T.bg,color:T.text,fontWeight:700}}>
    Loading DUBI...
  </div>
)}
        {phase==="welcome" && <WelcomeScreen onStart={() => setPhase("auth")} />}
        {phase==="auth" && <AuthScreen onSuccess={async (existingOnboarding) => {
  if (existingOnboarding) {
   setUserData(existingOnboarding);
   const currentAiPlan = await fetchCurrentAiPlanFromBackend(existingOnboarding);
   const authPlan = currentAiPlan || (await generateAiPlanFromBackend(existingOnboarding)).plan || calcPlan(existingOnboarding);
   setPlan(authPlan);
   setSwaps(await fetchIngredientSwapsFromBackend());
   setActiveTab("today");
   setPhase("app");
} else {
  setActiveTab("today");
  setPhase("onboarding");
}
}} onBack={() => setPhase("welcome")} />}

        {phase==="onboarding" && (
  <OnboardingScreen
    onCancelEdit={() => {
  localStorage.removeItem("dubi_edit_onboarding");
  setPhase("app");
  setActiveTab("settings");
}}
    initialData={userData}
    isEditing={localStorage.getItem("dubi_edit_onboarding") === "true"}
    onComplete={handleComplete}
    isPremium={isPremium}
  />
)}
        {phase==="safety" && safetyReview && (
          <SafetyReviewScreen
            findings={safetyReview.findings}
            rawData={safetyReview.rawData}
            onContinue={(chosenGoal) => {
              const adjusted = applySafetyOverrides(safetyReview.rawData, safetyReview.findings);
              // Se l'utente ha scelto esplicitamente un obiettivo (forced choice), usa quello
              if (chosenGoal) adjusted.goal = chosenGoal;
              setSafetyReview(null);
              finalizeData(adjusted);
            }}
            onEdit={() => {
              setSafetyReview(null);
              setPhase("onboarding");
            }}
          />
        )}
        {phase==="consent" && (
          <ConsentScreen
            userData={userData}
            onAccept={(c)=>{ setConsentData(c); setPhase("paywall"); }}
            onDecline={()=>setPhase("welcome")}
          />
        )}
        {phase==="minor" && (
          <MinorScreen
            userData={userData}
            onComplete={()=>setPhase("consent")}
            onBack={()=>setPhase("onboarding")}
          />
        )}
        {phase==="paywall" && <PaywallScreen userData={userData} plan={plan} onContinue={()=>setPhase("loading")} />}
        {phase==="loading" && <LoadingScreen onDone={() => {
  setActiveTab("today");
  setPhase("app");
}} />}
        {phase==="app" && (
          <>
            <div style={{height:"100vh",overflowY:"auto",position:"relative"}}>
              {activeTab==="today"    && <TodayScreen userData={userData} plan={plan} isFirstAccess={isFirstAccess} swaps={swaps} />}
              {activeTab==="weekly"   && <WeeklyScreen userData={userData} plan={plan} swaps={swaps} setSwaps={setSwaps} />}
              {activeTab==="shopping" && <ShoppingScreen userData={userData} plan={plan} swaps={swaps} partnerProfile={partnerProfile} onLinkPartner={setPartnerProfile} onUnlinkPartner={()=>setPartnerProfile(null)}/>}
              {activeTab==="progress" && <ProgressScreen userData={userData} plan={plan} onOpenWrap={()=>setShowWrap(true)} onAiPlanRefresh={handleAiPlanRefreshFromProgress} />}
              {activeTab==="sources"  && <SourcesScreen />}
              {activeTab==="settings" && (
  <SettingsScreen
    userData={userData}
    setUserData={setUserData}
    plan={plan}
    setPlan={setPlan}
    isPremium={isPremium}
    onUpgrade={handlePremiumUpgrade}
    onLogout={handleLogout}
    onEditOnboarding={() => {
  setActiveTab("today");
  setPhase("onboarding");
}}
  />
)}
            </div>
    
            <BottomNav active={activeTab} onChange={setActiveTab} />
            {showWrap && <WrapScreen userData={userData} plan={plan} onClose={()=>setShowWrap(false)} />}
          </>
        )}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LangProvider><DUBIApp /></LangProvider>);

    // Nascondi schermata di boot non appena React ha montato il componente
    window._dubiReady = true;
    clearTimeout(window._dubiBootTimer);
    const bootEl = document.getElementById('dubi-boot');
    if (bootEl) {
      bootEl.classList.add('hidden');
      setTimeout(function() { bootEl.style.display = 'none'; }, 350);
    }
  </script>
</body>
</html>
